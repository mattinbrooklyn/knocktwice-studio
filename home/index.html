<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#F7F2EC" media="(max-width: 768px)">
  <link rel="icon" type="image/webp" href="/assets/images/Logo_DifferentStates_03-30-26_Favicon_Eye_Blue.webp">
  <title>Home — Knock Twice</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Handjet:wght@100..900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/styles.css">
  <style>
    html, body { overflow-x: hidden; overflow-y: auto; scrollbar-width: none; background: var(--color-blue); }
    body::-webkit-scrollbar { display: none; }

    #page-scaler { position: relative; width: 100%; }

    /* ── Page canvas ──────────────────────────────────────────────
       Fixed 1440×1024 (exact Figma frame size), centered and
       uniformly scaled by JS to fit the viewport.               */
    .page {
      position: absolute;
      top: 0; left: 0;
      width: 1440px;
      height: 1024px;
      transform-origin: top left;
      background: var(--color-bg);
    }

    /* Home uses the wordmark, not the keyhole — override shared .logo */
    .logo { top: 70px; width: 204px; height: 80px; }
    .logo .wordmark-keyhole { transition: fill 0.2s ease; }
    .logo:hover .wordmark-keyhole { fill: #378CDA; }

    /* ── Furniture pieces ─────────────────────────────────────── */
    .furniture {
      position: absolute;
      user-select: none;
      -webkit-user-select: none;
    }
    .furniture img.base {
      display: block;
      width: 100%; height: 100%;
      pointer-events: none;
      object-fit: fill;
    }
    .furniture .eyes {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      overflow: visible;
    }
    .furniture.is-dragging { z-index: 200; }

    /* ── Circular sticker ─────────────────────────────────────── */
    .sticker-outer {
      position: absolute;
      left: 1186px; top: 74px;
      width: 176px; height: 176px;
      z-index: 150; /* above furniture (overlaps couch on mobile top-right) */
    }
    @keyframes coinflip {
      from { transform: rotateY(0deg); }
      to   { transform: rotateY(360deg); }
    }
    .sticker-hand-spin {
      animation: coinflip 5s linear infinite;
      transform-box: fill-box;
      transform-origin: 50% 50%;
    }
    .sticker-outer .sticker-svg {
      display: block;
      width: 176px;
      height: 176px;
    }

    /* Desktop: footer sits just below the fold, revealed on scroll.
       #page-scaler is sized to exactly 100vh by the scaling JS, so a
       relative-positioned footer lands immediately below the fold.
       Mobile override below keeps it pinned to the viewport. */
    body.home .footer {
      position: relative;
      z-index: 600;
      margin-top: 0;
    }
    /* ── Monster easter egg ──────────────────────────────────────── */
    /* Rises from the bottom when all furniture is dragged off screen.
       Slow rise (3s) feels dramatic. Fast hide (.is-hiding, 600ms) feels
       snappy when the user clicks to dismiss — nobody wants to wait 3s
       for the monster to sink back after clicking it. */
    #home-monster {
      position: fixed;
      bottom: 0; left: 0;
      width: 100%;
      z-index: 500;
      pointer-events: none;
      transform: translateY(100%);
      transition: transform 3s cubic-bezier(0.4, 0, 0.2, 1);
      /* Flex: wave stack + blue fill; matches About modal foot (rem-height wave + tickers). */
      display: flex;
      flex-direction: column;
    }
    /* Above home footer (600), below .logo / .nav (1000) so clicks hit the monster */
    /* Risen: not as high as 15% — closer to About newsletter / modal wave band */
    #home-monster.is-visible {
      z-index: 650;
      transform: translateY(40%);
      pointer-events: auto;
      cursor: pointer;
    }
    #home-monster.is-hiding   { transition: transform 600ms cubic-bezier(0.4, 0, 0.2, 1); }

    /* About modal monster layout: fixed wave strip + separate desktop/mobile tickers
       (see about/index.html .monster-ticker / .monster-ticker-mobile / .monster-area). */
    #home-monster .home-monster-stack {
      position: relative;
      width: 100%;
      flex-shrink: 0;
      line-height: 0;
    }
    .home-monster-ticker {
      position: absolute;
      bottom: calc(100% - 96px);
      left: 0;
      width: 100%;
      height: 156px;
      overflow: hidden;
      z-index: 6;
      pointer-events: none;
    }
    .home-monster-ticker svg { display: block; }
    .home-monster-ticker-mobile {
      display: none;
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: calc(var(--wave-height-mobile) + 20px);
      overflow: hidden;
      z-index: 7;
      pointer-events: none;
    }
    .home-monster-ticker-mobile svg { display: block; }
    /* Ticker + overflow: only when easter egg is on (or sliding away). The ticker sits
       above the wave (absolute, tall); with overflow:visible and translateY(100%), that
       arch can still paint in the viewport before the empty state — so clip + hide text. */
    #home-monster:not(.is-visible):not(.is-hiding) {
      overflow: hidden;
    }
    #home-monster:not(.is-visible):not(.is-hiding) .home-monster-ticker,
    #home-monster:not(.is-visible):not(.is-hiding) .home-monster-ticker-mobile {
      visibility: hidden;
      opacity: 0;
    }
    #home-monster .home-monster-area {
      position: relative;
      width: 100%;
      height: var(--wave-height-desktop);
      line-height: 0;
      flex-shrink: 0;
    }
    #home-monster .home-monster-area img.wave {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      display: block;
      pointer-events: none;
    }
    #home-monster .home-monster-area .monster-eyes-overlay,
    #home-monster .home-monster-area .monster-eyes-overlay-mobile {
      position: absolute;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      overflow: visible;
    }
    /* Desktop: only 1440×116 eyes — do not set mobile overlay to block (would stack two pairs). */
    #home-monster .home-monster-area .monster-eyes-overlay {
      display: block;
    }
    #home-monster .home-monster-area .monster-eyes-overlay-mobile {
      display: none;
    }
    #home-monster .monster-fill {
      width: 100%;
      background: #378CDA;
      flex: 1;          /* fills remaining height of the fixed container */
      min-height: 50vh; /* desktop: tall viewports */
      margin-top: -1px; /* sub-pixel seam insurance */
    }

    /* ── Furniture eye animation ──────────────────────────────────── */
    #nightstand-iris-l, #nightstand-iris-r,
    #carpet-iris-l, #carpet-iris-r,
    #dresser-iris-l, #dresser-iris-r,
    #vase-iris-l, #vase-iris-r,
    #couch-iris-l, #couch-iris-r {
      transition: cx 200ms ease-out, cy 200ms ease-out;
    }

    /* Home mobile header uses the wordmark (Logo_Full_Mobile-Web,
       119×47 at x=20, y=30) — overrides the global keyhole mobile
       rule. Has to be outside the @media too; declared inline for
       specificity since Home's desktop .logo also lives in this file. */

    /* ── Mobile (<=768px) ──────────────────────────────────────────
       Figma mobile master: frame id 7048:1185, 440×956.
       Canvas width switches to 440; JS scales by innerWidth/440 instead
       of innerWidth/1440. Furniture pieces re-laid per mobile coords.
       !important wins over the inline style="left:..." attrs used for
       desktop positions (JS drag sets inline styles without !important,
       so dragging is intentionally parked on mobile — user isn't going
       to drag 300×250 couches around on a 390px phone). */
    @media (max-width: 768px) {
      .page {
        width: 440px;
        height: 956px;
      }
      .logo {
        top: 30px;
        left: 20px;
        width: 119px;
        height: 47px;
      }
      /* Figma 7048:1185 / 7056:2437 Sticker_SpiralText — ~119×120, not desktop 176 */
      .sticker-outer {
        left: calc(100% / 3 + 98.33px) !important;
        top: 82px !important;
        width: 118.819px !important;
        height: 120.239px !important;
      }
      .sticker-outer .sticker-svg {
        width: 100%;
        height: 100%;
      }
      /* Figma 7052:58 couch wrapper: left 21, top 78, 269.404×256.867 */
      .furniture.couch {
        left: 21px !important;
        top: 78px !important;
        width: 269.404px !important;
        height: 256.867px !important;
      }
      /* Figma 7052:72 vase */
      .furniture.vase {
        left: calc(100% / 3 + 119.33px) !important;
        top: 262px !important;
        width: 122px !important;
        height: 221px !important;
      }
      /* Figma 7052:100 nightstand */
      .furniture.nightstand {
        left: -4px !important;
        top: 322px !important;
        width: 196px !important;
        height: 179px !important;
      }
      /* Figma 7052:44 carpet top 596 */
      .furniture.carpet {
        left: 0 !important;
        top: 596px !important;
        width: 281px !important;
        height: 172px !important;
      }
      /* Mobile: keep footer pinned to the viewport (desktop reveals
         it on scroll, but mobile has no hover-reveal affordance). */
      body.home .footer {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
      }
      /* Figma 7052:86 dresser top 483 */
      .furniture.dresser {
        left: 102px !important;
        top: 483px !important;
        width: 357px !important;
        height: 190px !important;
      }

      /* ── Monster empty state (Figma 7053:1258) ───────────────────
         No solid background on #home-monster / .monster-area: the wave SVG
         has transparent “sky” above the path — if the parent is blue, that
         area reads as flat blue; cream must show through for the curve. */
      body.home .footer {
        height: 56px;
        min-height: 56px;
        z-index: 800;
      }
      #home-monster {
        bottom: 56px;
        background: transparent;
      }
      #home-monster.is-visible {
        height: calc(100vh - 56px);
        max-height: calc(100vh - 56px);
        height: calc(100dvh - 56px);
        max-height: calc(100dvh - 56px);
        /* Slightly lower band than desktop — same idea as About wave-risen on small viewports */
        transform: translateY(44%);
      }
      .home-monster-ticker { display: none; }
      .home-monster-ticker-mobile { display: block; }
      #home-monster .home-monster-area {
        height: var(--wave-height-mobile) !important;
        overflow: hidden;
        line-height: 0;
        background: transparent;
        flex: 0 0 auto;
      }
      #home-monster .home-monster-area img.wave { object-fit: fill; }
      #home-monster .monster-fill {
        flex: 1 1 auto;
        min-height: 0;
      }
    }
  </style>
</head>

  <!-- Crossfade from splash: starts black, fades in over 500ms -->
  <div id="splash-fade" style="position:fixed;inset:0;background:#000;z-index:9999;pointer-events:none;"></div>
  <script>
    (function () {
      var el = document.getElementById('splash-fade');
      if (sessionStorage.getItem('from-splash')) {
        sessionStorage.removeItem('from-splash');
        requestAnimationFrame(function () { requestAnimationFrame(function () {
          el.style.transition = 'opacity 500ms ease';
          el.style.opacity    = '0';
          el.addEventListener('transitionend', function () { el.remove(); }, { once: true });
        }); });
      } else {
        el.remove(); // not coming from splash — no fade needed
      }
    }());
  </script>

  <script src="/assets/scripts.js" defer></script>
  <script>
    // ─── Uniform scale to fit viewport ───────────────────────────
    // The page is a fixed 1440×1024 canvas. JS scales it uniformly
    // so it fits entirely within the viewport at any window size,
    // while preserving exact Figma pixel ratios.
    const page   = document.querySelector('.page');
    const scaler = document.getElementById('page-scaler');
    let scale = 1;

    function scalePage() {
      // Desktop: canvas is 1440 wide and stretches to match viewport
      // height (single-screen playground). Mobile (<=768): canvas is
      // fixed to the Figma mobile frame (440×956, id 7048:1185); scroll
      // reveals anything below fold on short phones.
      const isMobile = window.innerWidth <= 768;
      const ref      = isMobile ? 440 : 1440;
      scale = window.innerWidth / ref;
      page.style.transform = `scale(${scale})`;

      if (isMobile) {
        page.style.height   = '956px';
        scaler.style.height = (956 * scale) + 'px';
      } else {
        const foldPx = Math.ceil(window.innerHeight / scale);
        page.style.height   = foldPx + 'px';
        scaler.style.height = foldPx * scale + 'px';
      }
    }
    scalePage();
    // Debounced resize — avoids layout thrashing during drag-resize
    var resizeTimer = 0;
    window.addEventListener('resize', function () {
      clearTimeout(resizeTimer);
      resizeTimer = setTimeout(scalePage, 100);
    });

    // ─── Draggable furniture ──────────────────────────────────────
    // Mouse events are in viewport pixels; furniture positions are in
    // page pixels (pre-scale). Divide by scale to convert between them.
    let dragging = null;
    let offsetX  = 0;
    let offsetY  = 0;
    let topZ     = 10;

    document.querySelectorAll('.furniture').forEach(el => {
      if (window.KT && window.KT.isDesktop) {
        el.addEventListener('mouseenter', () => KT.setCursor('hover'));
        el.addEventListener('mouseleave', () => { if (!dragging) KT.setCursor('default'); });
      }
      
      // Ensure element doesn't scroll the page on touch
      el.style.touchAction = 'none';
      
      el.addEventListener('pointerdown', e => {
        dragging = el;
        const rect = el.getBoundingClientRect();
        // Convert click offset into page (unscaled) coordinates
        offsetX = (e.clientX - rect.left) / scale;
        offsetY = (e.clientY - rect.top)  / scale;
        el.classList.add('is-dragging');
        el.style.zIndex = ++topZ;
        if (window.KT && window.KT.isDesktop) KT.setCursor('drag');
        el.setPointerCapture(e.pointerId);
        e.preventDefault();
      });
    });

    // rAF-throttled drag move
    var dragRaf = 0, dragMX = 0, dragMY = 0;
    function updateDragPos() {
      dragRaf = 0;
      if (!dragging) return;
      const pageRect = page.getBoundingClientRect();
      const x = (dragMX - pageRect.left) / scale - offsetX;
      const y = (dragMY - pageRect.top)  / scale - offsetY;
      dragging.style.setProperty('left', x + 'px', 'important');
      dragging.style.setProperty('top', y + 'px', 'important');
    }
    document.addEventListener('pointermove', e => {
      if (!dragging) return;
      dragMX = e.clientX;
      dragMY = e.clientY;
      if (!dragRaf) dragRaf = requestAnimationFrame(updateDragPos);
    }, { passive: true });

    document.addEventListener('pointerup', e => {
      if (dragging) {
        dragging.classList.remove('is-dragging');
        dragging = null;
        const under = document.elementFromPoint(e.clientX, e.clientY);
        if (window.KT && window.KT.isDesktop) KT.setCursor(under && under.closest('.furniture') ? 'hover' : 'default');
      }
    });
    
    document.addEventListener('pointercancel', e => {
      if (dragging) {
        dragging.classList.remove('is-dragging');
        dragging = null;
      }
    });

    // Prevent browser image-drag ghost
    document.querySelectorAll('.furniture img').forEach(img => {
      img.addEventListener('dragstart', e => e.preventDefault());
    });

    // ─── Monster easter egg ───────────────────────────────────────
    const homeMonster   = document.getElementById('home-monster');
    const homeMonIrisR  = document.getElementById('home-mon-iris-r');
    const homeMonIrisL  = document.getElementById('home-mon-iris-l');
    const homeMonIrisRM = document.getElementById('home-mon-iris-r-m');
    const homeMonIrisLM = document.getElementById('home-mon-iris-l-m');
    const homeMonsterArea = document.getElementById('home-monster-area');

    // Store original furniture positions for reset (desktop: inline Figma attrs).
    // Mobile layout uses @media !important; el.style only sees HTML inline, so
    // resetFurniture() clears inline left/top/width/height on narrow viewports
    // so class rules win — do not re-apply d.left (desktop) with !important.
    var furnitureDefaults = [];
    document.querySelectorAll('.furniture').forEach(function (el) {
      furnitureDefaults.push({
        el: el,
        left: el.style.left,
        top: el.style.top,
        zIndex: el.style.zIndex || ''
      });
    });

    // True if ≤20% of the element's area is inside the viewport
    function isMostlyOffscreen(el) {
      const r = el.getBoundingClientRect();
      if (r.width === 0 || r.height === 0) return true;
      const visW = Math.max(0, Math.min(window.innerWidth,  r.right)  - Math.max(0, r.left));
      const visH = Math.max(0, Math.min(window.innerHeight, r.bottom) - Math.max(0, r.top));
      return (visW * visH) / (r.width * r.height) <= 0.20;
    }

    var monsterShowing = false;

    function checkMonsterTrigger() {
      const pieces = document.querySelectorAll('.furniture');
      const allOff = Array.from(pieces).every(isMostlyOffscreen);
      var wasShowing = monsterShowing;
      monsterShowing = allOff;
      homeMonster.classList.toggle('is-visible', allOff);

      // Pause / resume furniture eye timers to avoid wasted work
      if (allOff && !wasShowing) {
        pauseAllEyeAnimations();
        scheduleHomeMonsterBlink();
      } else if (!allOff && wasShowing) {
        resumeAllEyeAnimations();
        stopHomeMonsterBlink();
      }
    }

    // Re-check after every drop (pointerup covers mouse + touch; mouseup removed to avoid double fire)
    document.addEventListener('pointerup', function (e) {
      if (e.pointerType === 'mouse' && e.button !== 0) return;
      checkMonsterTrigger();
    });

    // Ticker: SMIL <animate> on textPath (same 30s / 18s as About modal).

    // ─── Reset furniture when monster is clicked ──────────────────
    function resetFurniture() {
      const useMobileLayout = window.matchMedia('(max-width: 768px)').matches;
      furnitureDefaults.forEach(function (d) {
        if (useMobileLayout) {
          d.el.style.removeProperty('left');
          d.el.style.removeProperty('top');
          d.el.style.removeProperty('width');
          d.el.style.removeProperty('height');
          d.el.style.removeProperty('z-index');
        } else {
          d.el.style.setProperty('left', d.left, 'important');
          d.el.style.setProperty('top', d.top, 'important');
          d.el.style.zIndex = d.zIndex;
        }
      });
      topZ = 10;
      // Hide monster quickly (600ms) — nobody wants to wait 3s after clicking
      monsterShowing = false;
      homeMonster.classList.add('is-hiding');
      homeMonster.classList.remove('is-visible');
      // Strip the fast-hide override once it's offscreen so the next reveal
      // uses the slow 3s dramatic rise.
      setTimeout(function () { homeMonster.classList.remove('is-hiding'); }, 650);
      resumeAllEyeAnimations();
      stopHomeMonsterBlink();
    }

    homeMonster.addEventListener('click', resetFurniture);

    // Hand cursor over the monster (desktop custom-cursor system).
    // `cursor: pointer` in CSS does nothing here because global `cursor: none`
    // hides the native cursor on desktop — so we swap to the 'hover' state
    // of the custom cursor overlay.
    if (window.KT && window.KT.isDesktop) {
      homeMonster.addEventListener('mouseenter', function () {
        if (homeMonster.classList.contains('is-visible')) KT.setCursor('hover');
      });
      homeMonster.addEventListener('mouseleave', function () {
        if (!dragging) KT.setCursor('default');
      });
    }

    // Monster eye tracking — convert clientX/Y to wave SVG coords
    function trackMonsterIris(el, svgX, svgY, restX, restY, maxX, maxY) {
      const dx = svgX - restX, dy = svgY - restY;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < 1) { el.setAttribute('cx', restX); el.setAttribute('cy', restY); return; }
      const strength = Math.min(dist / 200, 1);
      el.setAttribute('cx', restX + (dx / dist) * maxX * strength);
      el.setAttribute('cy', restY + (dy / dist) * maxY * strength);
    }

    // rAF-throttled monster eye tracking
    var monRaf = 0, monMX = 0, monMY = 0;
    function updateMonsterEyes() {
      monRaf = 0;
      // Mobile: same 440×64 mapping as About / footer (wave strip rect).
      if (window.innerWidth <= 768) {
        if (!homeMonIrisRM || !homeMonIrisLM || !homeMonsterArea) return;
        const wr = homeMonsterArea.getBoundingClientRect();
        if (!wr.width || !wr.height) return;
        const svgX = ((monMX - wr.left) / wr.width) * 440;
        const svgY = ((monMY - wr.top) / wr.height) * 64;
        trackMonsterIris(homeMonIrisRM, svgX, svgY, 248.5, 62.5, 10, 3);
        trackMonsterIris(homeMonIrisLM, svgX, svgY, 142, 64, 10, 3);
        return;
      }
      // Desktop: eyes layer viewBox 1440×116.154 (matches About rest positions).
      const eyesSvg = document.getElementById('home-monster-eyes-svg');
      if (!eyesSvg || !homeMonIrisR || !homeMonIrisL) return;
      const r    = eyesSvg.getBoundingClientRect();
      if (!r.width || !r.height) return;
      const svgX = (monMX - r.left) / r.width  * 1440;
      const svgY = (monMY - r.top)  / r.height * 116.154;
      trackMonsterIris(homeMonIrisR, svgX, svgY, 652.9,  49.45, 20, 5);
      trackMonsterIris(homeMonIrisL, svgX, svgY, 495.41, 49.46, 20, 5);
    }
    document.addEventListener('mousemove', function(e) {
      if (document.hidden) return;
      monMX = e.clientX;
      monMY = e.clientY;
      if (!monRaf) monRaf = requestAnimationFrame(updateMonsterEyes);
    }, { passive: true });
    document.addEventListener('touchmove', function(e) {
      if (document.hidden) return;
      if (!e.touches.length) return;
      monMX = e.touches[0].clientX;
      monMY = e.touches[0].clientY;
      if (!monRaf) monRaf = requestAnimationFrame(updateMonsterEyes);
    }, { passive: true });

    var homeMonsterBlinkGroups = document.querySelectorAll('#home-monster .eye-blink-group');
    function homeMonsterBlink() {
      homeMonsterBlinkGroups.forEach(function (g) { g.classList.add('closing'); });
      setTimeout(function () {
        homeMonsterBlinkGroups.forEach(function (g) {
          g.classList.remove('closing');
          g.classList.add('opening');
        });
        setTimeout(function () {
          homeMonsterBlinkGroups.forEach(function (g) { g.classList.remove('opening'); });
        }, 110);
      }, 65);
    }
    var homeMonsterBlinkNextId = 0;
    function stopHomeMonsterBlink() {
      if (homeMonsterBlinkNextId) {
        clearTimeout(homeMonsterBlinkNextId);
        homeMonsterBlinkNextId = 0;
      }
    }
    function scheduleHomeMonsterBlink() {
      stopHomeMonsterBlink();
      homeMonsterBlinkNextId = setTimeout(function () {
        homeMonsterBlinkNextId = 0;
        if (!homeMonster.classList.contains('is-visible')) return;
        homeMonsterBlink();
        scheduleHomeMonsterBlink();
      }, 2000 + Math.random() * 5000);
    }

    // ─── Furniture eye animation (cancellable) ────────────────────
    // Each instance returns { pause(), resume() } so we can stop the
    // recursive setTimeout chains when furniture is off-screen.
    var allEyeControllers = [];

    function pauseAllEyeAnimations() {
      allEyeControllers.forEach(function (c) { c.pause(); });
    }
    function resumeAllEyeAnimations() {
      allEyeControllers.forEach(function (c) { c.resume(); });
    }

    function animateFurnitureEyes(cfg) {
      var irisL  = cfg.irisL,  irisR  = cfg.irisR;
      var eyeL   = cfg.eyeL,   eyeR   = cfg.eyeR;
      var restL  = cfg.restL,  restR  = cfg.restR;
      var rangeL = cfg.rangeL, rangeR = cfg.rangeR;

      var paused = false;
      var lookTimer = 0, blinkTimer = 0;

      function look() {
        if (paused) return;
        var angle = Math.random() * Math.PI * 2;
        var mag   = Math.random();
        var dx    = Math.cos(angle) * mag;
        var dy    = Math.sin(angle) * mag;
        irisL.setAttribute('cx', restL.x + dx * rangeL);
        irisL.setAttribute('cy', restL.y + dy * rangeL);
        irisR.setAttribute('cx', restR.x + dx * rangeR);
        irisR.setAttribute('cy', restR.y + dy * rangeR);
        lookTimer = setTimeout(look, 3000 + Math.random() * 3000);
      }

      function singleBlink(onDone) {
        if (paused) return;
        var holdMs = 60 + Math.random() * 90;
        eyeL.style.visibility = 'hidden';
        eyeR.style.visibility = 'hidden';
        blinkTimer = setTimeout(function () {
          eyeL.style.visibility = '';
          eyeR.style.visibility = '';
          if (!paused) setTimeout(onDone || function () {}, 0);
        }, holdMs);
      }

      function blink() {
        if (paused) return;
        singleBlink(function () {
          if (Math.random() < 0.25) {
            var gapMs = 100 + Math.random() * 80;
            blinkTimer = setTimeout(function () { singleBlink(scheduleBlink); }, gapMs);
          } else {
            scheduleBlink();
          }
        });
      }

      function scheduleBlink() {
        if (paused) return;
        blinkTimer = setTimeout(blink, 4000 + Math.random() * 4000);
      }

      var ctrl = {
        pause: function () {
          paused = true;
          clearTimeout(lookTimer);
          clearTimeout(blinkTimer);
          // Ensure eyes are visible when paused (blink may have hidden them)
          eyeL.style.visibility = '';
          eyeR.style.visibility = '';
        },
        resume: function () {
          if (!paused) return;
          paused = false;
          look();
          scheduleBlink();
        }
      };

      allEyeControllers.push(ctrl);

      look();
      scheduleBlink();
    }

    setTimeout(function () {
      animateFurnitureEyes({
        irisL:    document.getElementById('couch-iris-l'),
        irisR:    document.getElementById('couch-iris-r'),
        eyeL:     document.getElementById('couch-eye-l'),
        eyeR:     document.getElementById('couch-eye-r'),
        restL:    { x: 212.6,  y: 77.8 },
        restR:    { x: 139.25, y: 86.85 },
        rangeL:   12,  // bumped — iris sits at ~78% from left edge
        rangeR:   14,  // same reason
      });
    }, Math.random() * 3000);

    setTimeout(function () {
      animateFurnitureEyes({
        irisL:    document.getElementById('vase-iris-l'),
        irisR:    document.getElementById('vase-iris-r'),
        eyeL:     document.getElementById('vase-eye-l'),
        eyeR:     document.getElementById('vase-eye-r'),
        restL:    { x: 139.85, y: 123.9 },
        restR:    { x: 91.05,  y: 107.23 },
        rangeL:   6.0,  // increased — iris sits near right edge, needs room to travel left
        rangeR:   3.0,  // same reason
      });
    }, Math.random() * 3000);

    setTimeout(function () {
      animateFurnitureEyes({
        irisL:    document.getElementById('dresser-iris-l'),
        irisR:    document.getElementById('dresser-iris-r'),
        eyeL:     document.getElementById('dresser-eye-l'),
        eyeR:     document.getElementById('dresser-eye-r'),
        restL:    { x: 273.2, y: 86.75 },
        restR:    { x: 167.9, y: 72 },
        rangeL:   12.19,  // socket half-width (38.69) minus iris radius (26.5)
        rangeR:   11.11,  // socket half-width (35.11) minus iris radius (24)
      });
    }, Math.random() * 3000);

    setTimeout(function () {
      animateFurnitureEyes({
        irisL:    document.getElementById('carpet-iris-l'),
        irisR:    document.getElementById('carpet-iris-r'),
        eyeL:     document.getElementById('carpet-eye-l'),
        eyeR:     document.getElementById('carpet-eye-r'),
        restL:    { x: 283, y: 118 },
        restR:    { x: 202, y: 140 },
        rangeL:   8.09,   // socket half-width (27.09) minus iris radius (19)
        rangeR:   10.02,  // socket half-width (34.02) minus iris radius (24)
      });
    }, Math.random() * 3000);

    animateFurnitureEyes({
      irisL:    document.getElementById('nightstand-iris-l'),
      irisR:    document.getElementById('nightstand-iris-r'),
      eyeL:     document.getElementById('nightstand-eye-l'),
      eyeR:     document.getElementById('nightstand-eye-r'),
      restL:    { x: 236.9, y: 95.6 },
      restR:    { x: 159.4, y: 107.0 },
      rangeL:   8.1,
      rangeR:   10.16,
    });

    // Wordmark keyhole iris tracking
    (function () {
      var wmIris = null;
      var restX = 27.325, restY = 19.055;
      var maxX = 4.0, maxY = 2.0;

      // rAF-throttled wordmark iris
      var wmRaf = 0, wmMX = 0, wmMY = 0;
      function updateWmIris() {
        wmRaf = 0;
        if (!wmIris) wmIris = document.getElementById('wordmark-iris');
        if (!wmIris) return;

        var rect = wmIris.ownerSVGElement.getBoundingClientRect();
        var eyeX = rect.left + rect.width  * 0.509;
        var eyeY = rect.top  + rect.height * 0.191;

        var dx   = wmMX - eyeX;
        var dy   = wmMY - eyeY;
        var dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < 1) { wmIris.setAttribute('cx', restX); wmIris.setAttribute('cy', restY); return; }

        var strength = Math.min(dist / 400, 1);
        wmIris.setAttribute('cx', restX + (dx / dist) * maxX * strength);
        wmIris.setAttribute('cy', restY + (dy / dist) * maxY * strength);
      }
      document.addEventListener('mousemove', function (e) {
        wmMX = e.clientX;
        wmMY = e.clientY;
        if (!wmRaf) wmRaf = requestAnimationFrame(updateWmIris);
      }, { passive: true });
    }());
  </script>

</body>
