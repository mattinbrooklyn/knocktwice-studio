<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shop — Knock Twice</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Erica+One&family=Handjet:wght@100..900&family=Instrument+Sans&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/styles.css">
  <style>
    html, body { height: 100%; overflow: hidden; }

    /* ── Page canvas ────────────────────────────────────────────────
       Fixed 1440×1024 (exact Figma frame), centered and uniformly
       scaled by JS to fit the viewport. */
    .page {
      position: absolute;
      top: 0; left: 0;
      width: 1440px; height: 1110px;
      transform-origin: top left;
      background: var(--color-bg);
      overflow: hidden;
    }


    /* ── Page heading ──────────────────────────────────────────────*/
    .h1 {
      position: absolute;
      left: 316px; top: 70px;
      font-family: 'Erica One', sans-serif;
      font-size: 65px;
      line-height: 68px;
      font-weight: 400;
      color: var(--color-ink);
    }

    /* ── Subhead / body copy ───────────────────────────────────────*/
    .intro {
      position: absolute;
      left: 316px; top: 168px;
      width: 808px;
      font-family: 'Instrument Sans', sans-serif;
      font-size: 14px;
      line-height: 22px;
      font-weight: 400;
      color: var(--color-ink);
    }

    /* ── Shop grid placeholder ─────────────────────────────────────
       This entire area will be replaced with a Shopify embed.
       The commented div below marks the swap zone clearly. */
    .shop-placeholder {
      position: absolute;
      left: 316px; top: 220px;
      width: 1084px; height: 580px;
    }

    /* ── Monster footer wave ───────────────────────────────────────
       Blue wave SVG + SVG overlay with eye whites + iris circles. */
    .monster-area {
      position: absolute;
      left: 0; top: 910px;
      width: 1440px; height: 110px;
      z-index: 5;
    }
    .monster-area img.wave {
      position: absolute;
      top: 0; left: 0;
      width: 1440px; height: 110px;
      display: block;
      pointer-events: none;
    }
    .monster-eyes-overlay {
      position: absolute;
      top: 0; left: 0;
      width: 1440px; height: 110px;
      pointer-events: none;
      overflow: visible;
    }

    .footer { top: 1020px; }
  </style>
</head>
<body>

  <!-- ── Page canvas ─────────────────────────────────────────────── -->
  <div class="page">

    <!-- Logo -->
    <a href="home.html" class="logo">
      <img src="assets/logo-nav-keyhole.svg" alt="Knock Twice">
    </a>

    <!-- Navigation -->
    <nav class="nav">
      <a href="about.html">About</a>
      <a href="interiors.html">Interiors</a>
      <a href="experiences.html">Experiences</a>
      <a href="shop.html" class="active">Shop</a>
      <a href="contact.html">Contact</a>
    </nav>

    <!-- Heading -->
    <h1 class="h1">NOT QUITE READY</h1>

    <!-- Subhead -->
    <p class="intro">Nothing to see here. (There will be soon though.) ⌛️</p>

    <!-- ═══════════════════════════════════════════════════════════
         SHOP GRID: replace this entire section with your
         Shopify collection embed (liquid template or JS snippet).
         The div below is an intentional empty placeholder.
         ═══════════════════════════════════════════════════════════ -->
    <div class="shop-placeholder">
      <!-- SHOPIFY EMBED GOES HERE -->
    </div>

    <!-- ── Monster footer wave ─────────────────────────────────────
         Blue wave SVG + eye whites + iris circles (cursor-tracking).
         Wave viewBox: 0 0 1440 110. Wave top at canvas y:824.
         Eye whites derived from Figma; iris centers approximated:
           Right: (633, 39) Left: (476, 38)  -->
    <div class="monster-area" id="monster-area">
      <img class="wave" src="assets/monster-wave-shop.svg" alt="">
      <svg class="monster-eyes-overlay" id="monster-eyes-svg"
           viewBox="0 0 1440 110" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <clipPath id="mon-eye-r-clip">
            <path transform="translate(573 22)"
              d="M0 26.2514C43.7331 -10.9423 82.9881 -6.48788 119.75 26.2514C75.9056 35.4212 35.555 36.426 0 26.2514Z"/>
          </clipPath>
          <clipPath id="mon-eye-l-clip">
            <path transform="translate(412 20)"
              d="M0 28.0226C45.7339 -12.7789 87.7997 -5.73732 127.849 28.0226C81.0428 37.8174 37.9608 38.8855 0 28.0226Z"/>
          </clipPath>
        </defs>
        <!-- Eye whites -->
        <path fill="white" transform="translate(573 22)"
          d="M0 26.2514C43.7331 -10.9423 82.9881 -6.48788 119.75 26.2514C75.9056 35.4212 35.555 36.426 0 26.2514Z"/>
        <path fill="white" transform="translate(412 20)"
          d="M0 28.0226C45.7339 -12.7789 87.7997 -5.73732 127.849 28.0226C81.0428 37.8174 37.9608 38.8855 0 28.0226Z"/>
        <!-- Iris circles (JS moves cx/cy, clip path constrains to eye whites) -->
        <circle id="mon-iris-r" clip-path="url(#mon-eye-r-clip)"
          cx="633" cy="39" r="30" fill="#32261F"/>
        <circle id="mon-iris-l" clip-path="url(#mon-eye-l-clip)"
          cx="476" cy="38" r="30" fill="#32261F"/>
      </svg>
    </div>

    <!-- Footer -->
    <footer class="footer">
      <div class="footer-icons">
        <a href="#" aria-label="Instagram"><img src="assets/icon-instagram.svg" alt="Instagram"></a>
        <a href="#" aria-label="TikTok"><img src="assets/icon-tiktok.svg" alt="TikTok"></a>
      </div>
      <span class="footer-copyright">© 2026 Knock Twice Studio. All rights reserved.</span>
    </footer>

  </div><!-- /page -->

  <script src="assets/scripts.js"></script>
  <script src="assets/scripts.js"></script>
  <script>
    // ── Scale page ─────────────────────────────────────────────────
    // 1440×1024 canvas (exact Figma frame). Uniform scale keeps all
    // pixel coordinates correct at any viewport size.
    const page = document.querySelector('.page');
    let scale = 1;

    function scalePage() {
      scale = window.innerWidth / 1440;
      page.style.transform = `scale(${scale})`;
    }
    scalePage();
    window.addEventListener('resize', scalePage);


    document.addEventListener('mousemove', e => {
      updateMonsterEyes(e.clientX, e.clientY);
    });


    // ── Eye tracking ───────────────────────────────────────────────
    // Converts viewport coords → canvas coords (undoes scale + centering).
    function toCanvas(vx, vy) {
      const r = page.getBoundingClientRect();
      return { x: (vx - r.left) / scale, y: (vy - r.top) / scale };
    }

    // Moves an SVG circle toward the cursor within an elliptical envelope.
    function trackIris(el, localX, localY, restX, restY, maxX, maxY) {
      const dx = localX - restX;
      const dy = localY - restY;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < 1) {
        el.setAttribute('cx', restX);
        el.setAttribute('cy', restY);
        return;
      }
      const nx = dx / dist;
      const ny = dy / dist;
      const strength = Math.min(dist / 200, 1);
      el.setAttribute('cx', restX + nx * maxX * strength);
      el.setAttribute('cy', restY + ny * maxY * strength);
    }

    // Monster wave — SVG viewBox 0 0 1440 110, wave div top at canvas y:910
    const monIrisR = document.getElementById('mon-iris-r');
    const monIrisL = document.getElementById('mon-iris-l');

    function updateMonsterEyes(vx, vy) {
      const { x, y } = toCanvas(vx, vy);
      trackIris(monIrisR, x, y - 910, 633, 39, 20, 5);
      trackIris(monIrisL, x, y - 910, 476, 38, 20, 5);
    }
  </script>

</body>
</html>
