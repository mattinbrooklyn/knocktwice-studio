  <script>
    // ── Scale page ─────────────────────────────────────────────────
    // 1440×1024 canvas (exact Figma frame). Uniform scale keeps all
    // pixel coordinates correct at any viewport size.
    const page        = document.querySelector('.page');
    const scaler      = document.getElementById('page-scaler');
    const monsterArea = document.getElementById('monster-area');
    const ticker      = document.getElementById('monster-ticker');
    const footer      = document.querySelector('.footer');
    let scale   = 1;
    let waveTop = 910; // updated each resize

    function scalePage() {
      scale   = window.innerWidth / 1440;
      page.style.transform = `scale(${scale})`;
      // Wave top at exactly the fold; ticker sits 65px above wave
      waveTop = Math.ceil(window.innerHeight / scale);
      ticker.style.top      = (waveTop - 65) + 'px';
      monsterArea.style.top = waveTop + 'px';
      footer.style.top      = (waveTop + 116) + 'px';
      page.style.height     = (waveTop + 200) + 'px';
      scaler.style.height   = (waveTop + 200) * scale + 'px';
    }
    scalePage();
    window.addEventListener('resize', scalePage);


    document.addEventListener('mousemove', e => {
      updateMonsterEyes(e.clientX, e.clientY);
    });


    // ── Eye tracking ───────────────────────────────────────────────
    // Converts viewport coords → canvas coords (undoes scale + centering).
    function toCanvas(vx, vy) {
      const r = page.getBoundingClientRect();
      return { x: (vx - r.left) / scale, y: (vy - r.top) / scale };
    }

    // Moves an SVG circle toward the cursor within an elliptical envelope.
    function trackIris(el, localX, localY, restX, restY, maxX, maxY) {
      const dx = localX - restX;
      const dy = localY - restY;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < 1) {
        el.setAttribute('cx', restX);
        el.setAttribute('cy', restY);
        return;
      }
      const nx = dx / dist;
      const ny = dy / dist;
      const strength = Math.min(dist / 200, 1);
      el.setAttribute('cx', restX + nx * maxX * strength);
      el.setAttribute('cy', restY + ny * maxY * strength);
    }

    // Monster wave — SVG viewBox 0 0 1440 110, wave div top at canvas y:910
    const monIrisR = document.getElementById('mon-iris-r');
    const monIrisL = document.getElementById('mon-iris-l');

    function updateMonsterEyes(vx, vy) {
      const { x, y } = toCanvas(vx, vy);
      trackIris(monIrisR, x, y - waveTop, 652.9, 49.45, 20, 5);
      trackIris(monIrisL, x, y - waveTop, 495.41, 49.46, 20, 5);
    }
  </script>
