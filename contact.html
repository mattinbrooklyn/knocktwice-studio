<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact — Knock Twice</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Erica+One&family=Handjet:wght@100..900&family=Instrument+Sans&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/styles.css">
  <style>
    html, body { overflow-x: hidden; overflow-y: auto; scrollbar-width: none; }
    body::-webkit-scrollbar { display: none; }

    #page-scaler { position: relative; width: 100%; }

    /* ── Page canvas ────────────────────────────────────────────────
       Fixed 1440×1024 (exact Figma frame), centered and uniformly
       scaled by JS to fit the viewport. */
    .page {
      position: absolute;
      top: 0; left: 0;
      width: 1440px; height: 1110px;
      transform-origin: top left;
      background: var(--color-bg);
      overflow: hidden;
    }


    /* ── Heading ───────────────────────────────────────────────────*/
    .h1 {
      position: absolute;
      left: 316px; top: 70px;
      font-family: 'Erica One', sans-serif;
      font-size: 65px;
      line-height: 68px;
      font-weight: 400;
      color: var(--color-ink);
      z-index: 1;
    }

    /* ── "WHO'S THERE?" marquee ───────────────────────────────────*/
    .whos-there-marquee {
      position: absolute;
      left: 568px; top: 96px;
      width: 595px; height: 129px;
      pointer-events: none;
      overflow: hidden;
      z-index: 2;
    }
    .whos-there-marquee svg {

    /* ── Body text ─────────────────────────────────────────────────*/
    .intro {
      position: absolute;
      left: 316px; top: 244px;
      width: 808px;
      font-family: 'Instrument Sans', sans-serif;
      font-size: 14px;
      line-height: 22px;
      font-weight: 400;
      color: var(--color-ink);

    /* ── Contact form ──────────────────────────────────────────────
       Email + Name sit side by side; textarea below; Send button
       at the bottom. All within a 808px-wide column at left:316. */

    /* Pill inputs (Email, Name) */
    .input-row {
      position: absolute;
      left: 316px; top: 296px;
      width: 808px; height: 55px;
      display: flex;
      gap: 9.52px;
    }
    .input-row input {
      flex: 1;
      height: 55px;
      background: white;
      border: 2px solid #32261F;
      border-radius: 100px;
      padding: 0 20px;
      font-family: 'Handjet', sans-serif;
      font-size: 16px;
      font-weight: 400;
      color: var(--color-ink);
      letter-spacing: -0.16px;
      font-variation-settings: 'ELGR' 1, 'ELSH' 2, 'wght' 400;
      outline: none;
      cursor: none;
    }
    .input-row input::placeholder { color: #9A7555; }
    .input-row input:focus { border-color: #008BE0; }

    /* Message textarea */
    .textarea-wrap {
      position: absolute;
      left: 316px; top: 361px;
      width: 808px; height: 194px;
    }
    .textarea-wrap textarea {
      width: 100%; height: 100%;
      background: white;
      border: 2px solid #32261F;
      border-radius: 14px;
      padding: 20px;
      font-family: 'Handjet', sans-serif;
      font-size: 16px;
      font-weight: 400;
      color: var(--color-ink);
      letter-spacing: -0.16px;
      font-variation-settings: 'ELGR' 1, 'ELSH' 2, 'wght' 400;
      resize: none;
      outline: none;
      cursor: none;
    }
    .textarea-wrap textarea::placeholder { color: #9A7555; }
    .textarea-wrap textarea:focus { border-color: #008BE0; }

    /* Send button */
    .btn-send {
      position: absolute;
      left: 316px; top: 565px;
      width: 808px; height: 55px;
      background: var(--color-green);
      border: none;
      border-radius: 100px;
      font-family: 'Handjet', sans-serif;
      font-size: 16px;
      font-weight: 400;
      color: #f7f2ec;
      letter-spacing: -0.16px;
      font-variation-settings: 'ELGR' 1, 'ELSH' 2, 'wght' 400;
      cursor: none;
      transition: opacity 0.15s;
    }
    .btn-send:hover { opacity: 0.85; }

    /* ── Monster footer wave ───────────────────────────────────────*/
    .monster-area {
      position: absolute;
      left: 0; top: 910px;
      width: 1440px; height: 110px;
      z-index: 5;
      background: var(--color-blue);
    }
    .monster-area img.wave {
      position: absolute;
      top: 0; left: 0;
      width: 1440px; height: 110px;
      display: block;
      pointer-events: none;
    }
    .monster-eyes-overlay {
      position: absolute;
      top: 0; left: 0;
      width: 1440px; height: 110px;
      pointer-events: none;
      overflow: visible;
    }

    .footer { top: 1020px; }
  </style>
</head>
<body>

  <div id="page-scaler">
  <!-- ── Page canvas ─────────────────────────────────────────────── -->
  <div class="page">

    <!-- Logo -->
    <a href="home.html" class="logo">
      <img src="assets/logo-nav-keyhole.svg" alt="Knock Twice">
    </a>

    <!-- Navigation -->
    <nav class="nav">
      <a href="about.html">About</a>
      <a href="interiors.html">Interiors</a>
      <a href="experiences.html">Experiences</a>
      <a href="shop.html">Shop</a>
      <a href="contact.html" class="active">Contact</a>
    </nav>

    <!-- Heading -->
    <h1 class="h1">KNOCK KNOCK</h1>

    <div class="whos-there-marquee">
      <!-- Wave path: starts at x=0, period=300px, midline y=64, peak y=34, valley y=94.
           Path extends to x=3000 so the full animation range is always covered.
           startOffset=0 puts the first character at x=0 (left edge of the visible area).
           JS decrements startOffset each frame; wraps by one measured text-unit for seamless loop. -->
      <svg viewBox="0 0 595 129" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <path id="whos-path" d="M0 64 C75 34,125 34,150 64 C175 94,225 94,300 64 C375 34,425 34,450 64 C475 94,525 94,600 64 C675 34,725 34,750 64 C775 94,825 94,900 64 C975 34,1025 34,1050 64 C1075 94,1125 94,1200 64 C1275 34,1325 34,1350 64 C1375 94,1425 94,1500 64 C1575 34,1625 34,1650 64 C1675 94,1725 94,1800 64 C1875 34,1925 34,1950 64 C1975 94,2025 94,2100 64 C2175 34,2225 34,2250 64 C2275 94,2325 94,2400 64 C2475 34,2525 34,2550 64 C2575 94,2625 94,2700 64 C2775 34,2825 34,2850 64 C2875 94,2925 94,3000 64"/>
        </defs>
        <text font-family="'Handjet', sans-serif" font-size="22" font-weight="500" fill="#D4A0C8" letter-spacing="-0.5">
          <textPath id="whos-textpath" href="#whos-path" startOffset="0">WHO'S THERE? 👀  WHO'S THERE? 👀  WHO'S THERE? 👀  WHO'S THERE? 👀  WHO'S THERE? 👀  WHO'S THERE? 👀  WHO'S THERE? 👀  WHO'S THERE? 👀  WHO'S THERE? 👀  WHO'S THERE? 👀  WHO'S THERE? 👀  WHO'S THERE? 👀  WHO'S THERE? 👀  WHO'S THERE? 👀  WHO'S THERE? 👀  WHO'S THERE? 👀  WHO'S THERE? 👀  WHO'S THERE? 👀  WHO'S THERE? 👀  WHO'S THERE? 👀  </textPath>
        </text>
      </svg>
    </div>

    <!-- Body copy -->
    <p class="intro">We're so glad you came by. Have something in mind? Just say hello and we'll figure out the rest.</p>

    <!-- ── Contact form ────────────────────────────────────────────
         No backend wired up yet — connect to your form handler here.
         Inputs are real form fields so tab order and browser
         autofill work as expected. -->
    <div class="input-row">
      <input type="email" name="email" placeholder="Email*" autocomplete="off">
      <input type="text"  name="name"  placeholder="Name*"  autocomplete="off">
    </div>

    <div class="textarea-wrap">
      <textarea name="message" placeholder="Knock Twice, we might not hear you the first time..."></textarea>
    </div>

    <button class="btn-send" type="button">Send</button>

    <!-- ── Monster footer wave ─────────────────────────────────────
         Same wave SVG as shop page. Eye whites + iris circles.
         Wave top at canvas y:824.
         Iris rest positions in SVG space: right (633, 43), left (476, 43). -->
    <div class="monster-area" id="monster-area">
      <img class="wave" src="assets/monster-wave-shop.svg" alt="">
      <svg class="monster-eyes-overlay" id="monster-eyes-svg"
           viewBox="0 0 1440 110" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <clipPath id="mon-eye-r-clip">
            <path transform="translate(573 27)"
              d="M0 26.2514C43.7331 -10.9423 82.9881 -6.48788 119.75 26.2514C75.9056 35.4212 35.555 36.426 0 26.2514Z"/>
          </clipPath>
          <clipPath id="mon-eye-l-clip">
            <path transform="translate(412 26)"
              d="M0 28.0226C45.7339 -12.7789 87.7997 -5.73732 127.849 28.0226C81.0428 37.8174 37.9608 38.8855 0 28.0226Z"/>
          </clipPath>
        </defs>
        <path fill="white" transform="translate(573 27)"
          d="M0 26.2514C43.7331 -10.9423 82.9881 -6.48788 119.75 26.2514C75.9056 35.4212 35.555 36.426 0 26.2514Z"/>
        <path fill="white" transform="translate(412 26)"
          d="M0 28.0226C45.7339 -12.7789 87.7997 -5.73732 127.849 28.0226C81.0428 37.8174 37.9608 38.8855 0 28.0226Z"/>
        <circle id="mon-iris-r" clip-path="url(#mon-eye-r-clip)"
          cx="633" cy="43" r="30" fill="#32261F"/>
        <circle id="mon-iris-l" clip-path="url(#mon-eye-l-clip)"
          cx="476" cy="43" r="30" fill="#32261F"/>
      </svg>
    </div>

    <!-- Footer -->
    <footer class="footer">
      <div class="footer-icons">
        <a href="https://www.instagram.com/knocktwice.studio" aria-label="Instagram" target="_blank" rel="noopener noreferrer"><img src="assets/icon-instagram.svg" alt="Instagram"></a>
        <a href="https://www.tiktok.com/@knocktwice.studio" aria-label="TikTok" target="_blank" rel="noopener noreferrer"><img src="assets/icon-tiktok.svg" alt="TikTok"></a>
      </div>
      <span class="footer-copyright">© 2026 Knock Twice Studio. All rights reserved.</span>
    </footer>

  </div><!-- /page -->
  </div><!-- /#page-scaler -->

  <script src="assets/scripts.js"></script>
  <script>
    // ── Scale page ─────────────────────────────────────────────────
    const page        = document.querySelector('.page');
    const scaler      = document.getElementById('page-scaler');
    const monsterArea = document.getElementById('monster-area');
    const footer      = document.querySelector('.footer');
    let scale   = 1;
    let waveTop = 910; // updated each resize

    function scalePage() {
      scale   = window.innerWidth / 1440;
      page.style.transform = `scale(${scale})`;
      // Wave top at exactly the fold; footer immediately below the wave
      waveTop = Math.ceil(window.innerHeight / scale);
      monsterArea.style.top = waveTop + 'px';
      footer.style.top      = (waveTop + 110) + 'px';
      page.style.height     = (waveTop + 200) + 'px';
      scaler.style.height   = (waveTop + 200) * scale + 'px';
    }
    scalePage();
    window.addEventListener('resize', scalePage);


    document.addEventListener('mousemove', e => {
      updateMonsterEyes(e.clientX, e.clientY);
    });


    // ── Eye tracking ───────────────────────────────────────────────
    // Converts viewport coords → canvas coords (undoes scale + centering).
    function toCanvas(vx, vy) {
      const r = page.getBoundingClientRect();
      return { x: (vx - r.left) / scale, y: (vy - r.top) / scale };
    }

    // Moves an SVG circle toward the cursor within an elliptical envelope.
    function trackIris(el, localX, localY, restX, restY, maxX, maxY) {
      const dx = localX - restX;
      const dy = localY - restY;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < 1) {
        el.setAttribute('cx', restX);
        el.setAttribute('cy', restY);
        return;
      }
      const nx = dx / dist;
      const ny = dy / dist;
      const strength = Math.min(dist / 200, 1);
      el.setAttribute('cx', restX + nx * maxX * strength);
      el.setAttribute('cy', restY + ny * maxY * strength);
    }

    // Monster wave — SVG viewBox 0 0 1440 110, wave div top at canvas y:910
    const monIrisR = document.getElementById('mon-iris-r');
    const monIrisL = document.getElementById('mon-iris-l');

    function updateMonsterEyes(vx, vy) {
      const { x, y } = toCanvas(vx, vy);
      trackIris(monIrisR, x, y - waveTop, 633, 43, 20, 5);
      trackIris(monIrisL, x, y - waveTop, 476, 43, 20, 5);
    }

    // ── WHO'S THERE marquee ────────────────────────────────────────
    // Path starts at x=0. startOffset=0 → first char at x=0.
    // Decrementing offset scrolls text left; new chars enter from the right.
    // Wrap interval = one text-unit width, measured via getComputedTextLength
    // after fonts load — this guarantees a pixel-perfect seamless loop.
    const whosTextpath = document.getElementById('whos-textpath');
    let whosOffset  = 0;
    let whosUnit    = 0; // measured once after font load
    let whosPrev    = null;

    function measureWhosUnit() {
      // Measure one repeat of the text string on a straight line (close enough
      // to arc length for this gentle wave). The total text is 20 identical
      // repeats, so one unit = total / 20.
      const ns  = 'http://www.w3.org/2000/svg';
      const svg = document.createElementNS(ns, 'svg');
      svg.style.cssText = 'position:absolute;left:-9999px;top:-9999px;visibility:hidden';
      const txt = document.createElementNS(ns, 'text');
      txt.setAttribute('font-family', "'Handjet', sans-serif");
      txt.setAttribute('font-size', '22');
      txt.setAttribute('font-weight', '500');
      txt.setAttribute('letter-spacing', '-0.5');
      txt.textContent = "WHO'S THERE? 👀  WHO'S THERE? 👀  WHO'S THERE? 👀  WHO'S THERE? 👀  WHO'S THERE? 👀  WHO'S THERE? 👀  WHO'S THERE? 👀  WHO'S THERE? 👀  WHO'S THERE? 👀  WHO'S THERE? 👀  WHO'S THERE? 👀  WHO'S THERE? 👀  WHO'S THERE? 👀  WHO'S THERE? 👀  WHO'S THERE? 👀  WHO'S THERE? 👀  WHO'S THERE? 👀  WHO'S THERE? 👀  WHO'S THERE? 👀  WHO'S THERE? 👀  ";
      svg.appendChild(txt);
      document.body.appendChild(svg);
      const total = txt.getComputedTextLength();
      document.body.removeChild(svg);
      return total / 20;
    }

    function animateWhos(ts) {
      if (whosPrev !== null) {
        const dt = Math.min(ts - whosPrev, 50);
        whosOffset -= 51 * (dt / 1000);
        if (whosUnit > 0 && whosOffset <= -whosUnit) whosOffset += whosUnit;
        whosTextpath.setAttribute('startOffset', whosOffset.toFixed(2));
      }
      whosPrev = ts;
      requestAnimationFrame(animateWhos);
    }

    // Wait for Handjet to load before measuring, then kick off the loop.
    document.fonts.ready.then(() => {
      whosUnit = measureWhosUnit();
      requestAnimationFrame(animateWhos);
    });
  </script>

</body>
</html>
