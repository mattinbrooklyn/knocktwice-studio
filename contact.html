<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact — Knock Twice</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Erica+One&family=Handjet:wght@100..900&family=Instrument+Sans&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      background: #f7f2ec;
      cursor: none;
      overflow: hidden;
    }

    /* ── Custom cursor ──────────────────────────────────────────────*/
    #custom-cursor {
      position: fixed;
      left: 0; top: 0;
      pointer-events: none;
      z-index: 9999;
      will-change: transform;
      transform: translate(-200px, -200px);
      width: 48px; height: 48px;
    }
    #custom-cursor svg { width: 100%; height: 100%; display: block; }

    /* ── Page canvas ────────────────────────────────────────────────
       Fixed 1440×1024 (exact Figma frame), centered and uniformly
       scaled by JS to fit the viewport. */
    .page {
      position: absolute;
      top: 50%; left: 50%;
      width: 1440px; height: 1024px;
      transform-origin: center center;
      background: #f7f2ec;
      overflow: hidden;
    }

    /* ── Logo ──────────────────────────────────────────────────────*/
    .logo {
      position: absolute;
      left: 40px; top: 61px;
      width: 52px; height: 100px;
    }
    .logo img { width: 100%; height: 100%; display: block; object-fit: contain; object-position: left top; }

    /* ── Navigation ────────────────────────────────────────────────*/
    .nav {
      position: absolute;
      left: 40px; top: 200px;
      width: 256px;
    }
    .nav a {
      display: block;
      font-family: 'Handjet', sans-serif;
      font-size: 22px;
      font-weight: 400;
      line-height: 27px;
      letter-spacing: -0.22px;
      color: #32261F;
      text-decoration: none;
      font-variation-settings: 'ELGR' 1, 'ELSH' 2;
      margin-bottom: 8px;
    }
    .nav a.active { font-weight: 700; }
    .nav a:hover { opacity: 0.65; }

    /* ── Heading ───────────────────────────────────────────────────*/
    .h1 {
      position: absolute;
      left: 316px; top: 70px;
      font-family: 'Erica One', sans-serif;
      font-size: 65px;
      line-height: 68px;
      font-weight: 400;
      color: #32261F;
      z-index: 1;
    }

    /* ── "WHO'S THERE?" arc ticker ────────────────────────────────
       Absolutely positioned at canvas origin (left:0, top:0).
       The bezier path lives in raw canvas pixel coords — no viewBox
       distortion — so font metrics are exactly right. clipPath
       enforces visibility only within x:316–1124 (content column).
       z-index:2 places it in front of the heading. */
    #who-arc {
      position: absolute;
      left: 0; top: 0;
      width: 1440px; height: 230px;
      pointer-events: none;
      overflow: visible;
      z-index: 2;
    }

    /* ── Body text ─────────────────────────────────────────────────*/
    .intro {
      position: absolute;
      left: 316px; top: 244px;
      width: 808px;
      font-family: 'Instrument Sans', sans-serif;
      font-size: 14px;
      line-height: 22px;
      font-weight: 400;
      color: #32261F;
    }

    /* ── Contact form ──────────────────────────────────────────────
       Email + Name sit side by side; textarea below; Send button
       at the bottom. All within a 808px-wide column at left:316. */

    /* Pill inputs (Email, Name) */
    .input-row {
      position: absolute;
      left: 316px; top: 296px;
      width: 808px; height: 55px;
      display: flex;
      gap: 9.52px;
    }
    .input-row input {
      flex: 1;
      height: 55px;
      background: white;
      border: 2px solid #32261F;
      border-radius: 100px;
      padding: 0 20px;
      font-family: 'Handjet', sans-serif;
      font-size: 16px;
      font-weight: 400;
      color: #32261F;
      letter-spacing: -0.16px;
      font-variation-settings: 'ELGR' 1, 'ELSH' 2;
      outline: none;
      cursor: none;
    }
    .input-row input::placeholder { color: #9A7555; }
    .input-row input:focus { border-color: #008BE0; }

    /* Message textarea */
    .textarea-wrap {
      position: absolute;
      left: 316px; top: 361px;
      width: 808px; height: 194px;
    }
    .textarea-wrap textarea {
      width: 100%; height: 100%;
      background: white;
      border: 2px solid #32261F;
      border-radius: 14px;
      padding: 20px;
      font-family: 'Handjet', sans-serif;
      font-size: 16px;
      font-weight: 400;
      color: #32261F;
      letter-spacing: -0.16px;
      font-variation-settings: 'ELGR' 1, 'ELSH' 2;
      resize: none;
      outline: none;
      cursor: none;
    }
    .textarea-wrap textarea::placeholder { color: #9A7555; }
    .textarea-wrap textarea:focus { border-color: #008BE0; }

    /* Send button */
    .btn-send {
      position: absolute;
      left: 316px; top: 565px;
      width: 808px; height: 55px;
      background: #51B18C;
      border: none;
      border-radius: 100px;
      font-family: 'Handjet', sans-serif;
      font-size: 16px;
      font-weight: 400;
      color: #f7f2ec;
      letter-spacing: -0.16px;
      font-variation-settings: 'ELGR' 1, 'ELSH' 2;
      cursor: none;
      transition: opacity 0.15s;
    }
    .btn-send:hover { opacity: 0.85; }

    /* ── Monster footer wave ───────────────────────────────────────*/
    .monster-area {
      position: absolute;
      left: 0; top: 824px;
      width: 1440px; height: 110px;
      z-index: 5;
    }
    .monster-area img.wave {
      position: absolute;
      top: 0; left: 0;
      width: 1440px; height: 110px;
      display: block;
      pointer-events: none;
    }
    .monster-eyes-overlay {
      position: absolute;
      top: 0; left: 0;
      width: 1440px; height: 110px;
      pointer-events: none;
      overflow: visible;
    }

    /* ── Footer bar ────────────────────────────────────────────────*/
    .footer {
      position: absolute;
      left: 0; top: 934px;
      width: 1440px; height: 90px;
      background: #378CDA;
      display: flex;
      align-items: center;
    }
    .footer-icons {
      position: absolute;
      left: 40px;
      display: flex;
      align-items: center;
      gap: 20px;
    }
    .footer-icons a { display: flex; align-items: center; width: 20px; height: 20px; }
    .footer-icons img { width: 100%; height: 100%; display: block; }
    .footer-copyright {
      position: absolute;
      right: 40px;

      font-size: 16px;
      font-weight: 400;
      color: #f7f2ec;
      font-variation-settings: 'ELGR' 1, 'ELSH' 2;
      white-space: nowrap;
    }
  </style>

    <!-- ── "WHO'S THERE?" arc ticker ────────────────────────────────

         Path derived from Figma textPath bounding box (x:316, y:93,

    <svg id="who-arc" xmlns="http://www.w3.org/2000/svg">

  <script>
    // ── Scale page ─────────────────────────────────────────────────
    const page = document.querySelector('.page');
    let scale = 1;

    function scalePage() {
      scale = Math.min(window.innerWidth / 1440, window.innerHeight / 1024);
      page.style.transform = `translate(-50%, -50%) scale(${scale})`;
    }
    scalePage();
    window.addEventListener('resize', scalePage);


    // ── Custom cursor ──────────────────────────────────────────────
    const cursor       = document.getElementById('custom-cursor');
    const cursorOpen   = document.getElementById('cursor-open');
    const cursorClosed = document.getElementById('cursor-closed');

    document.addEventListener('mousemove', e => {
      cursor.style.transform = `translate(${e.clientX - 24}px, ${e.clientY}px)`;
      updateMonsterEyes(e.clientX, e.clientY);
    });


    // ── Eye tracking ───────────────────────────────────────────────
    // Converts viewport coords → canvas coords (undoes scale + centering).
    function toCanvas(vx, vy) {
      const r = page.getBoundingClientRect();
      return { x: (vx - r.left) / scale, y: (vy - r.top) / scale };
    }

    // Moves an SVG circle toward the cursor within an elliptical envelope.
    function trackIris(el, localX, localY, restX, restY, maxX, maxY) {
      const dx = localX - restX;
      const dy = localY - restY;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < 1) {
        el.setAttribute('cx', restX);
        el.setAttribute('cy', restY);
        return;
      }
      const nx = dx / dist;
      const ny = dy / dist;
      const strength = Math.min(dist / 200, 1);
      el.setAttribute('cx', restX + nx * maxX * strength);
      el.setAttribute('cy', restY + ny * maxY * strength);
    }

    // ── "WHO'S THERE?" arc scroll ──────────────────────────────────
    // Path: M -184 203 Q 720 19 1624 203. Canvas x:316 is ~500px
    // along the path from its start (316 - (-184) = 500). Keeping
    // startOffset ≥ 500 ensures the clip region (x:316–1124) always
    // has text — no blank frames. Decreasing startOffset scrolls
    // text right-to-left. Reset is seamless because text repeats
    // every WHO_REPEAT px.
    // WHO_REPEAT = Handjet SemiBold 22px advance width of one
    // "WHO'S THERE? 👀  " segment. Tune if you see a loop seam.
    const whoTP      = document.getElementById('who-textpath');
    const WHO_REPEAT = 252; // px — Handjet 22px, one "WHO'S THERE? 👀  " segment
    const WHO_SPEED  = 0.5; // canvas px per frame at 60fps
    let   whoOff     = 500 + WHO_REPEAT; // start: first char just past left clip edge

    (function tickWho() {
      whoOff -= WHO_SPEED;
      if (whoOff < 500) whoOff += WHO_REPEAT;
      whoTP.setAttribute('startOffset', whoOff + 'px');
      requestAnimationFrame(tickWho);
    })();


    // Monster wave — SVG viewBox 0 0 1440 110, wave div top at canvas y:824
    const monIrisR = document.getElementById('mon-iris-r');
    const monIrisL = document.getElementById('mon-iris-l');

    function updateMonsterEyes(vx, vy) {
      const { x, y } = toCanvas(vx, vy);
      trackIris(monIrisR, x, y - 824, 633, 43, 20, 5);
      trackIris(monIrisL, x, y - 824, 476, 43, 20, 5);
    }
  </script>
