<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <link rel="icon" type="image/png" href="assets/Logo_DifferentStates_03-30-26_Favicon_Eye_Blue.png">
  <title>Coming Soon — Knock Twice</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Erica+One&family=Handjet:wght@100..900&family=Instrument+Sans&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:    #f7f2ec;
      --ink:   #32261F;
      --blue:  #378CDA;
      --green: #51B18C;
    }

    html, body {
      height: 100%;
      overflow: hidden;
    }

    body {
      position: relative;
      height: 100vh;
      background: var(--bg); /* cream fills the top portion naturally */
      font-family: 'Instrument Sans', sans-serif;
      color: var(--ink);
    }

    /* ── Logo ─────────────────────────────────────────────────────── */
    /* 204px wide at 1440px viewport matches home.html canvas size */
    .logo {
      position: fixed;
      top: clamp(1.25rem, 4vh, 2.5rem);
      left: clamp(1.25rem, 3vw, 2.5rem);
      width: clamp(5rem, 14vw, 12.75rem);
      z-index: 100;
      display: block;
      text-decoration: none;
    }
    .logo img { display: block; width: 100%; height: auto; }

    /* ── Eye blink ────────────────────────────────────────────────── */
    .eye-blink-group {
      transform-box: fill-box;
      transform-origin: center;
    }
    .eye-blink-group.closing {
      transform: scaleY(0);
      transition: transform 60ms ease-in;
    }
    .eye-blink-group.opening {
      transform: scaleY(1);
      transition: transform 100ms ease-out;
    }

    /* ── Monster section ──────────────────────────────────────────── */
    /* Absolutely pinned to the bottom, 65% of viewport tall.
       Slides up from below — no flex seam possible. */
    .monster-section {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 65vh;
      background: var(--blue);
      transform: translateY(100%);
      will-change: transform;
    }
    .monster-section.risen {
      transform: translateY(0);
      transition: transform 800ms ease-out;
    }

    /* ── Wave ─────────────────────────────────────────────────────── */
    .wave-wrap {
      position: relative;
      width: 100%;
      /* No background — monster-section blue shows through below the arch.
         The SVG paints cream ABOVE the arch, so there is no color boundary
         to anti-alias and no seam is possible. */
      padding-bottom: calc(116.154 / 1440 * 100%);
    }
    .wave-wrap svg {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      display: block;
    }
    #eyes-svg { overflow: visible; }
    #eyes-svg-mobile { overflow: visible; }
    .eyes-svg-mobile { display: none !important; }

    /* ── Form card — white box floating over the blue body ────────── */
    .form-card {
      position: relative;
      z-index: 2;
      width: min(90%, 860px);
      margin: clamp(0.75rem, 2vw, 1.5rem) auto clamp(0.75rem, 2vw, 1.25rem);
      background: white;
      border: 2px solid var(--ink);
      border-radius: 0.875rem;
      padding: clamp(1.25rem, 3vw, 2rem) clamp(1.25rem, 3.5vw, 2.5rem) clamp(1rem, 2.5vw, 1.5rem);
    }

    .form-card h2 {
      font-family: 'Erica One', sans-serif;
      font-size: clamp(1rem, 2vw, 1.5rem);
      font-weight: 400;
      line-height: 1.15;
      color: var(--ink);
      margin-bottom: clamp(0.25rem, 0.75vw, 0.5rem);
    }

    .form-subtext {
      font-family: 'Instrument Sans', sans-serif;
      font-size: 14px;
      line-height: 22px;
      font-weight: 400;
      color: var(--ink);
      margin-bottom: clamp(0.75rem, 2vw, 1.25rem);
    }

    .form-row {
      display: flex;
      gap: 20px;
      margin-bottom: 0.375rem;
    }

    .cs-input {
      flex: none;
      min-width: 0;
      height: 3.4375rem; /* 55px — matches Figma */
      background: white;
      border: 2px solid var(--ink);
      border-radius: 100px;
      padding: 0 1.25rem;
      font-family: 'Handjet', sans-serif;
      font-size: 1rem;
      font-variation-settings: 'ELGR' 1, 'ELSH' 2, 'wght' 400;
      letter-spacing: -0.01em;
      color: var(--ink);
      outline: none;
    }
    .cs-input { flex: 2; min-width: 0; }

    .cs-input::placeholder { color: #9A7555; opacity: 1; }
    .cs-input.input-error { border-color: #C0392B; color: #C0392B; }

    .cs-submit {
      flex: 1;
      height: 3.4375rem; /* 55px — matches Figma */
      padding: 0;
      background: var(--green);
      border: none;
      border-radius: 100px;
      font-family: 'Handjet', sans-serif;
      font-size: 1rem;
      font-variation-settings: 'ELGR' 1, 'ELSH' 2, 'wght' 400;
      letter-spacing: -0.01em;
      color: var(--bg);
      cursor: pointer;
      white-space: nowrap;
      transition: opacity 0.15s;
    }
    .cs-submit:hover { opacity: 0.85; }

    .cs-error {
      display: none;
      font-size: 0.8125rem;
      line-height: 1.4;
      color: #C0392B;
      margin-top: 0.375rem;
      font-variation-settings: 'wdth' 100;
    }
    .cs-error.visible { display: block; }

    .fine-print {
      font-family: 'Instrument Sans', sans-serif;
      font-size: 14px;
      line-height: 22px;
      font-weight: 400;
      color: var(--ink);
      margin-top: clamp(0.5rem, 1.5vw, 0.875rem);
    }

    /* ── Mobile ───────────────────────────────────────────────────── */
    @media (max-width: 600px) {
      /* Use 100% not 100vh — on iOS, 100vh includes browser chrome,
         making body taller than the visible screen and breaking bottom: 0 */
      html, body { height: 100%; }
      body { height: 100%; }
      .monster-section { position: fixed; height: 80%; }
      /* Blue patch covers the safe-area gap below the footer on notch phones */
      body::after {
        content: '';
        position: fixed;
        bottom: 0; left: 0;
        width: 100%;
        height: env(safe-area-inset-bottom, 0px);
        background: var(--blue);
        z-index: 0;
      }
      .cs-footer { padding-bottom: max(0.625rem, env(safe-area-inset-bottom)); }
      .wave-wrap { padding-bottom: calc(64 / 440 * 100%); }
      .logo { width: 119px; top: 30px; left: 20px; }
      .eye-blink-group.closing { transform: none; opacity: 0; transition: opacity 50ms linear; }
      .eye-blink-group.opening { transform: none; opacity: 1; transition: opacity 80ms linear; }
      .eyes-svg-desktop { display: none !important; }
      .eyes-svg-mobile { display: block !important; }
      .form-card {
        width: calc(100% - 2rem);
        padding: 1.5rem 1.875rem;
        margin: 10vh auto clamp(0.5rem, 2vw, 1rem);
      }
      .form-card h2 {
        font-size: 20px;
        line-height: 25px;
        margin-bottom: 10px;
      }
      .form-subtext {
        font-size: 12px;
        line-height: 17px;
        margin-bottom: 18px;
      }
      .form-row { flex-direction: column; gap: 20px; }
      .cs-input {
        flex: none;
        width: 100%;
        height: 50px;
        font-size: 16px; /* 16px prevents iOS auto-zoom on focus */
        letter-spacing: -0.01em;
      }
      .cs-submit {
        flex: none;
        width: 100%;
        height: 50px;
        background: var(--green);
        border: 2px solid var(--green);
        color: var(--bg);
        font-size: 14px;
      }
      .cs-submit:hover { opacity: 0.85; }
      .fine-print {
        font-size: 12px;
        line-height: 17px;
      }
      .form-success h2 {
        font-size: 20px;
        line-height: 25px;
      }
      .form-success p {
        font-size: 12px;
        line-height: 17px;
      }
    }

    /* ── Success state ────────────────────────────────────────────── */
    .form-success { display: none; }
    .form-success h2 {
      font-family: 'Erica One', sans-serif;
      font-size: clamp(1rem, 2vw, 1.5rem);
      font-weight: 400;
      color: var(--ink);
      margin-bottom: clamp(0.25rem, 0.75vw, 0.5rem);
    }
    .form-success p {
      font-size: clamp(0.75rem, 1.2vw, 0.875rem);
      line-height: 1.55;
      color: var(--ink);
      font-variation-settings: 'wdth' 100;
    }

    /* ── Footer ───────────────────────────────────────────────────── */
    .cs-footer {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      padding: clamp(0.625rem, 1.5vw, 1rem) clamp(1.5rem, 5vw, 2.5rem);
    }

    .cs-footer-icons {
      display: flex;
      align-items: center;
      gap: 1.25rem;
    }
    .cs-footer-icons a {
      display: flex;
      align-items: center;
      width: 1.125rem;
      height: 1.125rem;
    }
    .cs-footer-icons img { width: 100%; height: 100%; display: block; }

    .cs-footer-copy {
      font-family: 'Handjet', sans-serif;
      font-size: clamp(0.6875rem, 1.1vw, 0.875rem);
      font-variation-settings: 'ELGR' 1, 'ELSH' 2, 'wght' 400;
      letter-spacing: -0.01em;
      color: var(--bg);
      opacity: 0.75;
      white-space: nowrap;
    }
  </style>
</head>
<body>

  <!-- Logo — full wordmark -->
  <div class="logo">
    <img src="assets/logo-full.svg" alt="Knock Twice">
  </div>

  <!-- Monster section — blue zone, rises on load -->
  <section class="monster-section" id="monster-section">

    <!-- Wave + eyes -->
    <div class="wave-wrap">
      <!-- Desktop arch wave (hidden on mobile) -->
      <svg class="eyes-svg-desktop" preserveAspectRatio="none" viewBox="0 0 1440 116.154" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path id="wave-path"
          d="M0 0 L1440 0 L1440 116.154 C1440 116.154 862.5 0 574.834 0 C263 0 0 116.154 0 116.154 Z"
          fill="#f7f2ec"/>
      </svg>
      <svg id="eyes-svg" class="eyes-svg-desktop" viewBox="0 0 1440 116" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <clipPath id="eye-r-clip">
            <path transform="translate(593.13 32.7)" d="M0 26.2514C43.7331 -10.9423 82.9881 -6.48788 119.75 26.2514C75.9056 35.4212 35.555 36.426 0 26.2514Z"/>
          </clipPath>
          <clipPath id="eye-l-clip">
            <path transform="translate(431.49 31.57)" d="M0 28.0226C45.7339 -12.7789 87.7997 -5.73732 127.849 28.0226C81.0428 37.8174 37.9608 38.8855 0 28.0226Z"/>
          </clipPath>
        </defs>
        <g class="eye-blink-group">
          <path id="eye-r-white" fill="white" transform="translate(593.13 32.7)" d="M0 26.2514C43.7331 -10.9423 82.9881 -6.48788 119.75 26.2514C75.9056 35.4212 35.555 36.426 0 26.2514Z"/>
          <circle id="iris-r" clip-path="url(#eye-r-clip)" cx="652.9" cy="49.45" r="30" fill="#32261F"/>
        </g>
        <g class="eye-blink-group">
          <path id="eye-l-white" fill="white" transform="translate(431.49 31.57)" d="M0 28.0226C45.7339 -12.7789 87.7997 -5.73732 127.849 28.0226C81.0428 37.8174 37.9608 38.8855 0 28.0226Z"/>
          <circle id="iris-l" clip-path="url(#eye-l-clip)" cx="495.41" cy="49.46" r="30" fill="#32261F"/>
        </g>
      </svg>

      <!-- Mobile dome wave (shown on mobile only) -->
      <!-- Dome body from Figma: M0 64C0 64 74.9186 0 170 0C281.919 0 440 64 440 64
           Cream fill is the area ABOVE the dome curve. -->
      <svg class="eyes-svg-mobile" preserveAspectRatio="none" viewBox="0 0 440 64" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path id="wave-path-m"
          d="M0 0 L440 0 L440 64 C440 64 281.919 0 170 0 C74.9186 0 0 64 0 64 Z"
          fill="#f7f2ec"/>
      </svg>
      <!-- Eye positions from Figma mobile frame (dome at y=314, eyes at y=344):
           Right eye white: translate(197.14, 30.76), path from 80.86×22.48 viewBox
           Left eye white:  translate(88, 30),        path from 86.33×24 viewBox
           Iris circles are large (r≈27-29), centered near y=64, clipped to eye-white shape
           so only the top crescent is visible — the peeking-eye effect. -->
      <svg id="eyes-svg-mobile" class="eyes-svg-mobile" viewBox="0 0 440 64" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <clipPath id="eye-r-clip-m">
            <path transform="translate(197.14 30.76)" d="M0 17.6111C29.5302 -7.34075 56.0366 -4.35248 80.8595 17.6111C51.2543 23.7628 24.008 24.4369 0 17.6111Z"/>
          </clipPath>
          <clipPath id="eye-l-clip-m">
            <path transform="translate(88 30)" d="M0 18.7993C30.8812 -8.57287 59.2856 -3.84896 86.3281 18.7993C54.7231 25.3703 25.6325 26.0869 0 18.7993Z"/>
          </clipPath>
        </defs>
        <g class="eye-blink-group">
          <path id="eye-r-white-m" fill="white" transform="translate(197.14 30.76)" d="M0 17.6111C29.5302 -7.34075 56.0366 -4.35248 80.8595 17.6111C51.2543 23.7628 24.008 24.4369 0 17.6111Z"/>
          <circle id="iris-r-m" clip-path="url(#eye-r-clip-m)" cx="248.5" cy="62.5" r="27.5" fill="#32261F"/>
        </g>
        <g class="eye-blink-group">
          <path id="eye-l-white-m" fill="white" transform="translate(88 30)" d="M0 18.7993C30.8812 -8.57287 59.2856 -3.84896 86.3281 18.7993C54.7231 25.3703 25.6325 26.0869 0 18.7993Z"/>
          <circle id="iris-l-m" clip-path="url(#eye-l-clip-m)" cx="142" cy="64" r="29" fill="#32261F"/>
        </g>
      </svg>
    </div>

    <!-- White card floating over the blue body -->
    <div class="form-card">
      <div id="form-default">
        <h2>You're early. We like that. 📬</h2>
        <p class="form-subtext">Slip your email under the door. We won't keep you waiting for long.</p>
        <div class="form-row">
          <input class="cs-input" id="cs-email" type="email" placeholder="Email*" autocomplete="email">
          <button class="cs-submit" id="cs-submit">Sign Up</button>
        </div>
        <p class="cs-error" id="cs-error">Hmm. That email doesn't look right. Try again?</p>
      </div>
      <div class="form-success" id="form-success">
        <h2>We got your note. 💌</h2>
        <p>See you on the other side. Speak soon.</p>
      </div>
    </div>

    <!-- Footer -->
    <footer class="cs-footer">
      <div class="cs-footer-icons">
        <a href="https://www.instagram.com/knocktwice.studio" aria-label="Instagram" target="_blank" rel="noopener noreferrer">
          <img src="assets/icon-instagram.svg" alt="Instagram">
        </a>
        <a href="https://www.tiktok.com/@knocktwice.studio" aria-label="TikTok" target="_blank" rel="noopener noreferrer">
          <img src="assets/icon-tiktok.svg" alt="TikTok">
        </a>
      </div>
      <span class="cs-footer-copy">© 2026 Knock Twice Studio. All rights reserved.</span>
    </footer>

  </section>

  <script>
    var SHEET_URL = 'https://script.google.com/macros/s/AKfycbyIKQkkXpe8kO5tsrhDdunKesfhD-xJGHTBSN1FhOC_Z-veuRK8fxkEbzX4_cbhmtZm/exec';

    // ── Monster entrance: 500ms delay, rises from below ────────────
    setTimeout(function() {
      document.getElementById('monster-section').classList.add('risen');
    }, 500);

    // ── Wave sway + eye tracking ───────────────────────────────────
    var waveOffset = 0;
    var mouseX = -999, mouseY = -999;
    var isMobile = window.matchMedia('(max-width: 600px)').matches;

    var eyesSvg, irisR, irisL, wavePath, eyeRWhite, eyeLWhite, eyeRClipPath, eyeLClipPath, eyeGroups;
    if (isMobile) {
      eyesSvg      = document.getElementById('eyes-svg-mobile');
      irisR        = document.getElementById('iris-r-m');
      irisL        = document.getElementById('iris-l-m');
      eyeGroups    = document.querySelectorAll('.eye-blink-group');
      // wave-path-m is static on mobile (no sway), no need to reference it
    } else {
      eyesSvg      = document.getElementById('eyes-svg');
      irisR        = document.getElementById('iris-r');
      irisL        = document.getElementById('iris-l');
      wavePath     = document.getElementById('wave-path');
      eyeRWhite    = document.getElementById('eye-r-white');
      eyeLWhite    = document.getElementById('eye-l-white');
      eyeRClipPath = document.querySelector('#eye-r-clip path');
      eyeLClipPath = document.querySelector('#eye-l-clip path');
      eyeGroups    = document.querySelectorAll('.eye-blink-group');
    }

    // Mobile wander: irises drift autonomously on touch devices
    var wanderTargetX = 0, wanderTargetY = 0;
    var wanderCurrentX = 0, wanderCurrentY = 0;

    function scheduleWander() {
      setTimeout(function() {
        wanderTargetX = (Math.random() - 0.5) * 36;
        wanderTargetY = (Math.random() - 0.5) * 8;
        setTimeout(function() {
          wanderTargetX = (Math.random() - 0.3) * 10;
          wanderTargetY = (Math.random() - 0.3) * 4;
          scheduleWander();
        }, 1000 + Math.random() * 1500);
      }, 2000 + Math.random() * 4000);
    }
    if (isMobile) scheduleWander();

    // On iOS, height:100% can measure the layout viewport (including browser chrome)
    // rather than the visual viewport, leaving a cream gap below the monster section.
    // window.innerHeight is always the true visual viewport height.
    if (isMobile) {
      var monsterEl = document.getElementById('monster-section');
      function fixMonsterHeight() {
        monsterEl.style.height = Math.round(window.innerHeight * 0.8) + 'px';
      }
      fixMonsterHeight();
      window.addEventListener('resize', fixMonsterHeight);
    }

    function trackIris(el, svgX, svgY, restX, restY, maxX, maxY) {
      var dx = svgX - restX, dy = svgY - restY;
      var dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < 1) { el.setAttribute('cx', restX); el.setAttribute('cy', restY); return; }
      var s = Math.min(dist / 300, 1);
      el.setAttribute('cx', restX + (dx / dist) * maxX * s);
      el.setAttribute('cy', restY + (dy / dist) * maxY * s);
    }

    document.addEventListener('mousemove', function(e) {
      mouseX = e.clientX; mouseY = e.clientY;
    });

    function swayLoop() {
      var o = waveOffset;

      if (isMobile) {
        // Mobile dome: irises drift via wander, no wave sway to apply
        wanderCurrentX += (wanderTargetX - wanderCurrentX) * 0.04;
        wanderCurrentY += (wanderTargetY - wanderCurrentY) * 0.04;
        irisR.setAttribute('cx', 248.5 + wanderCurrentX);
        irisR.setAttribute('cy', 62.5  + wanderCurrentY);
        irisL.setAttribute('cx', 142   + wanderCurrentX);
        irisL.setAttribute('cy', 64    + wanderCurrentY);
      } else {
        // Desktop: update arch wave path and eye white positions with waveOffset
        wavePath.setAttribute('d',
          'M0 0 L1440 0 L1440 116.154 C1440 116.154 ' + (862.5+o) + ' 0 ' + (574.834+o) +
          ' 0 C' + (263+o) + ' 0 0 116.154 0 116.154 Z');
        eyeRWhite.setAttribute('transform',    'translate(' + (593.13+o) + ' 32.7)');
        eyeLWhite.setAttribute('transform',    'translate(' + (431.49+o) + ' 31.57)');
        eyeRClipPath.setAttribute('transform', 'translate(' + (593.13+o) + ' 32.7)');
        eyeLClipPath.setAttribute('transform', 'translate(' + (431.49+o) + ' 31.57)');

        if (mouseX > -999) {
          var r = eyesSvg.getBoundingClientRect();
          var svgX = (mouseX - r.left) / r.width  * 1440;
          var svgY = (mouseY - r.top)  / r.height * 116;
          trackIris(irisR, svgX, svgY, 652.9  + o, 49.45, 20, 5);
          trackIris(irisL, svgX, svgY, 495.41 + o, 49.46, 20, 5);
        } else {
          irisR.setAttribute('cx', 652.9  + o);
          irisL.setAttribute('cx', 495.41 + o);
        }
      }

      requestAnimationFrame(swayLoop);
    }
    swayLoop();

    // ── Blink ──────────────────────────────────────────────────────
    // Occasional random blinks — close fast (60ms), open slower (100ms).
    function blink() {
      eyeGroups.forEach(function(g) { g.classList.add('closing'); });
      setTimeout(function() {
        eyeGroups.forEach(function(g) {
          g.classList.remove('closing');
          g.classList.add('opening');
        });
        setTimeout(function() {
          eyeGroups.forEach(function(g) { g.classList.remove('opening'); });
        }, 110);
      }, 65);
    }
    function scheduleBlink() {
      setTimeout(function() { blink(); scheduleBlink(); }, 2000 + Math.random() * 5000);
    }
    scheduleBlink();

    // ── Form ───────────────────────────────────────────────────────
    var emailInput  = document.getElementById('cs-email');
    var submitBtn   = document.getElementById('cs-submit');
    var errorMsg    = document.getElementById('cs-error');
    var formDefault = document.getElementById('form-default');
    var formSuccess = document.getElementById('form-success');

    emailInput.addEventListener('input', function() {
      emailInput.classList.remove('input-error');
      errorMsg.classList.remove('visible');
    });

    submitBtn.addEventListener('click', function() {
      var email = emailInput.value.trim();
      if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
        emailInput.classList.add('input-error');
        errorMsg.classList.add('visible');
        return;
      }
      formDefault.style.display = 'none';
      formSuccess.style.display = 'block';
      // Reset any iOS zoom that happened when the input was focused
      if (isMobile) {
        var vp = document.querySelector('meta[name=viewport]');
        vp.setAttribute('content', 'width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1');
        setTimeout(function() {
          vp.setAttribute('content', 'width=device-width, initial-scale=1.0, viewport-fit=cover');
        }, 300);
      }
      fetch(SHEET_URL + '?email=' + encodeURIComponent(email), { mode: 'no-cors' })
        .catch(function() {});
    });
  </script>

</body>
</html>
