<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Knock Twice — Home</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Erica+One&family=Instrument+Sans:wght@400;700&family=Handjet&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/styles.css">

<body data-page="home">

  <!-- Dark curtain overlay — drops away to reveal the page -->
  <div class="page-curtain" id="page-curtain"></div>

  <div class="home">
    <div class="home-content">

      <!-- ========================
           HEADER — Logo + Nav
           ======================== -->
      <header>
        <div class="wordmark">
          <a href="home.html"><img src="assets/logo-wordmark.svg" alt="Knock Twice"></a>
        </div>
        <nav>
          <ul class="nav-menu">
            <li><a href="about.html">About</a></li>
            <li><a href="interiors.html">Interiors</a></li>
            <li><a href="shop.html">Shop</a></li>
            <li><a href="contact.html">Contact</a></li>
          </ul>
        </nav>
      </header>

      <!-- ========================
           MAIN — Draggable furniture
           ======================== -->
      <main>
        <div class="furniture furniture-couch" data-no-rotate>
          <img src="assets/couch.png" alt="Blue couch with eyes">
        </div>

        <div class="furniture furniture-vase">
          <img src="assets/vase.png" alt="Yellow vase with eyes">
        </div>

        <div class="furniture furniture-nightstand" data-rotate-zone="legs">
          <img src="assets/nightstand.png" alt="Red nightstand with eyes">
        </div>

        <div class="furniture furniture-carpet" data-rotate-zone="top-left">
          <img src="assets/carpet.png" alt="Purple carpet with eyes">
        </div>

        <div class="furniture furniture-dresser" data-rotate-zone="legs">
          <img src="assets/dresser.png" alt="Green dresser with eyes">
        </div>

        <!-- Spiral text sticker -->
        <div class="spiral-text furniture">
          <svg viewBox="0 0 176 176" xmlns="http://www.w3.org/2000/svg">
            <defs>
              <path id="text-circle" d="M88,16 a72,72 0 1,1 0,144 a72,72 0 1,1 0,-144" fill="none"/>
            </defs>
            <circle cx="88" cy="88" r="72" fill="none" stroke="none"/>
            <text font-family="'Handjet', sans-serif" font-size="13.5" fill="#32261f" letter-spacing="0.5">
              <textPath href="#text-circle" startOffset="0%">Make yourself at home. No, seriously—feel free to rearrange the furniture &#x1F41E;</textPath>
            </text>
          </svg>
        </div>
      </main>

      <!-- ========================
           FOOTER
           ======================== -->

          </a>
        </div>
        <p class="footer-copy">&copy; 2026 Knock Twice Studio. All rights reserved.</p>
      </footer>

    </div>
  </div>

  <script src="assets/scripts.js"></script>
  <script>
  (function() {
    var curtain = document.getElementById('page-curtain');
    if (sessionStorage.getItem('curtain')) {
      sessionStorage.removeItem('curtain');
      // Small delay so the page renders underneath first
      requestAnimationFrame(function() {
        curtain.classList.add('curtain-drop');
      });
    } else {
      // No curtain needed (direct navigation) — hide immediately
      curtain.style.display = 'none';
    }
  })();
  </script>
</body>
</html>
