  <style>
    html, body { overflow-x: hidden; overflow-y: auto; scrollbar-width: none; }
    body::-webkit-scrollbar { display: none; }

    #page-scaler { position: relative; width: 100%; }

    /* ── Page canvas ──────────────────────────────────────────────
       Fixed 1440×1024 (exact Figma frame size), centered and
       uniformly scaled by JS to fit the viewport.               */
    .page {
      position: absolute;
      top: 0; left: 0;
      width: 1440px;
      height: 1024px;
      transform-origin: top left;
      background: var(--color-bg);
    }

    /* Home uses the wordmark, not the keyhole — override shared .logo */
    .logo { top: 70px; width: 204px; height: 80px; }

    /* ── Furniture pieces ─────────────────────────────────────── */
    .furniture {
      position: absolute;
      user-select: none;
      -webkit-user-select: none;
    }
    .furniture img.base {
      display: block;
      width: 100%; height: 100%;
      pointer-events: none;
      object-fit: fill;
    }
    .furniture .eyes {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      overflow: visible;
    }
    .furniture.is-dragging { z-index: 200; }

    /* ── Circular sticker ─────────────────────────────────────── */
    .sticker-outer {
      position: absolute;
      left: 1186px; top: 114px;
      width: 176px; height: 176px;
    }
    @keyframes coinflip {
      from { transform: rotateY(0deg); }
      to   { transform: rotateY(360deg); }
    }
    /* 3D coin flip — hand lives in an HTML layer so preserve-3d works properly */
    .hand-scene {
      position: absolute;
      top: 88px; left: 88px;
      transform: translate(-50%, -50%) rotate(-20.98deg);
      perspective: 500px;
    }
    .hand-coin {
      width: 110.1px; height: 111.4px;
      transform-style: preserve-3d;
      animation: coinflip 5s linear infinite;
    }
    .hand-layer {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
    }
    /* Front and back faces: hand art, each only visible from its own side */
    .hand-front { transform: translateZ(10px); backface-visibility: hidden; }
    .hand-back  { transform: translateZ(-10px) rotateY(180deg); backface-visibility: hidden; }
    /* Edge slices: solid fills that form the chunky metal body */
    .hand-edge  { background: #32261F; }
    .hand-e1    { transform: translateZ(7px); }
    .hand-e2    { transform: translateZ(4px); }
    .hand-e3    { transform: translateZ(1px); }
    .hand-e4    { transform: translateZ(-2px); }
    .hand-e5    { transform: translateZ(-5px); }
    .hand-e6    { transform: translateZ(-8px); }

    .footer { top: 934px; }
  </style>

  <script>
    // ─── Uniform scale to fit viewport ───────────────────────────
    // The page is a fixed 1440×1024 canvas. JS scales it uniformly
    // so it fits entirely within the viewport at any window size,
    // while preserving exact Figma pixel ratios.
    const page   = document.querySelector('.page');
    const scaler = document.getElementById('page-scaler');
    const footer = document.querySelector('.footer');
    let scale = 1;

    function scalePage() {
      scale = window.innerWidth / 1440;
      page.style.transform = `scale(${scale})`;
      // Place footer top at exactly the fold (first pixel below viewport)
      const foldPx = Math.ceil(window.innerHeight / scale);
      footer.style.top    = foldPx + 'px';
      page.style.height   = (foldPx + 90) + 'px';
      scaler.style.height = (foldPx + 90) * scale + 'px';
    }
    scalePage();
    window.addEventListener('resize', scalePage);

    // ─── Draggable furniture ──────────────────────────────────────
    // Mouse events are in viewport pixels; furniture positions are in
    // page pixels (pre-scale). Divide by scale to convert between them.
    let dragging = null;
    let offsetX  = 0;
    let offsetY  = 0;
    let topZ     = 10;

    document.querySelectorAll('.furniture').forEach(el => {
      el.addEventListener('mouseenter', () => KT.setCursor('hover'));
      el.addEventListener('mouseleave', () => { if (!dragging) KT.setCursor('default'); });
      el.addEventListener('mousedown', e => {
        dragging = el;
        const rect = el.getBoundingClientRect();
        // Convert click offset into page (unscaled) coordinates
        offsetX = (e.clientX - rect.left) / scale;
        offsetY = (e.clientY - rect.top)  / scale;
        el.classList.add('is-dragging');
        el.style.zIndex = ++topZ;
        KT.setCursor('drag');
        e.preventDefault();
      });
    });

    document.addEventListener('mousemove', e => {
      if (!dragging) return;
      const pageRect = page.getBoundingClientRect();
      // Convert viewport coords to page coords, then subtract the grab offset
      const x = (e.clientX - pageRect.left) / scale - offsetX;
      const y = (e.clientY - pageRect.top)  / scale - offsetY;
      dragging.style.left = x + 'px';
      dragging.style.top  = y + 'px';
    });

    document.addEventListener('mouseup', e => {
      if (dragging) {
        dragging.classList.remove('is-dragging');
        dragging = null;
        const under = document.elementFromPoint(e.clientX, e.clientY);
        KT.setCursor(under && under.closest('.furniture') ? 'hover' : 'default');
      }
    });

    // Prevent browser image-drag ghost
    document.querySelectorAll('.furniture img').forEach(img => {
      img.addEventListener('dragstart', e => e.preventDefault());
    });
  </script>
