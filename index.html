<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Knock Twice</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Erica+One&family=Instrument+Sans:wght@400;700&family=Handjet&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/styles.css">
</head>
<body data-page="splash">

  <!-- Hidden SVG: keyhole clip-path for the frame -->
  <svg width="0" height="0" style="position:absolute" aria-hidden="true">
    <defs>
      <clipPath id="keyhole-clip-norm" clipPathUnits="objectBoundingBox">
        <path d="M1 0.23795 C1 0.15594 0.96458 0.09575 0.89375 0.0575 C0.82292 0.01919 0.70979 0 0.55435 0 H0.44688 C0.29144 0 0.17806 0.01919 0.10686 0.05743 C0.03566 0.09575 0 0.15594 0 0.23795 C0 0.31996 0.03578 0.38093 0.10748 0.42078 C0.14523 0.44183 0.19466 0.45723 0.25541 0.46718 L0.1424 1 H0.85539 L0.7425 0.46769 C0.8046 0.45774 0.85489 0.44215 0.89314 0.42078 C0.96434 0.38093 1 0.31996 1 0.23795Z"/>
      </clipPath>
    </defs>
  </svg>

  <!-- ========================
       SPLASH — Keyhole logo
       ======================== -->
  <main class="splash">
    <div class="splash-frame">
      <svg class="splash-logo" viewBox="0 0 313 598" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Knock Twice — keyhole logo">
        <defs>
          <clipPath id="eyelid-clip">
            <path d="M89.9509 141.796C134.33 105.57 178.67 105.57 223.049 141.796C178.67 159.449 134.33 159.449 89.9509 141.796Z"/>
          </clipPath>
        </defs>
        <!-- Blue creature body — extends beyond viewBox so keyhole is fully filled.
             Uneven dome top only visible as creature drops out. -->
        <path d="M-30 700 L-30 70 C20 -15, 90 -35, 160 -20 C220 -8, 280 -30, 343 60 L343 700 Z" fill="#378CDA"/>
        <!-- Fixed eyelid clip; eye contents move inside to track cursor -->
        <g clip-path="url(#eyelid-clip)">
          <g class="eye">
            <circle cx="157.5" cy="151.5" r="80.5" fill="white"/>
            <path d="M165 151C185.435 151 202 134.658 202 114.5C202 94.3416 185.435 78 165 78C144.565 78 128 94.3416 128 114.5C128 134.658 144.565 151 165 151Z" fill="#32261F"/>
          </g>
        </g>
      </svg>
    </div>
  </main>

  <script src="assets/scripts.js"></script>
  <script>
  (function() {
    var splash = document.querySelector('.splash');
    var frame = splash.querySelector('.splash-frame');
    var logo = splash.querySelector('.splash-logo');
    var fired = false;

    frame.addEventListener('click', function() {
      if (fired) return;
      fired = true;

      // Monster face drops down out of the frame
      logo.classList.add('logo-drop');

      // Signal home page to play curtain reveal, then navigate
      setTimeout(function() {
        sessionStorage.setItem('curtain', '1');
        window.location.href = 'home.html';
      }, 800);
    });
  })();
  </script>
</body>
</html>
