<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Knock Twice</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 100%;
      height: 100%;
      background: #32261f;
      overflow: hidden;
      cursor: none;
    }

    #custom-cursor { position: fixed; left: 0; top: 0; pointer-events: none; z-index: 9999; will-change: transform; transform: translate(-200px,-200px); }
    #cursor-default { display: block; width: 45px; height: 49px; }
    #cursor-hover   { display: none;  width: 48px; height: 51px; }
    #cursor-drag    { display: none;  width: 48px; height: 40px; }
    body[data-cursor="hover"] #cursor-default { display: none; }
    body[data-cursor="hover"] #cursor-hover   { display: block; }
    body[data-cursor="drag"]  #cursor-default { display: none; }
    body[data-cursor="drag"]  #cursor-drag    { display: block; }

    .splash {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .keyhole {
      height: min(82vh, 598px);
      width: auto;
      /* transform-origin defaults to 50% 50% on HTML elements — correct for centered zoom */
      will-change: transform;
    }
  </style>
</head>
<body>

  <!-- Full-screen black overlay for the fade-to-black transition -->
  <div id="fade-overlay" style="position:fixed;inset:0;background:#000;opacity:0;pointer-events:none;z-index:9990;"></div>

  <div class="splash">
    <svg id="keyhole-svg" class="keyhole" viewBox="0 0 313 598" fill="none" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <!--
          Keyhole window — static clip path, never moves.
          Defines the visible aperture; only what's inside is ever shown.
        -->
        <clipPath id="keyhole-clip">
          <path d="M313 142.295C313 93.2516 301.915 57.2557 279.745 34.3841C257.575 11.4742 222.164 0 173.513 0H139.872C91.2211 0 55.7334 11.4742 33.4477 34.3458C11.1621 57.2557 0 93.2516 0 142.295C0 191.339 11.2006 227.795 33.6402 251.626C45.4566 264.213 60.9295 273.423 79.9436 279.371L44.5713 598H267.736L232.402 279.678C251.84 273.73 267.582 264.405 279.552 251.626C301.838 227.795 313 191.339 313 142.295Z"/>
        </clipPath>
      </defs>

      <!--
        Splash_Monster — the creature body + eyes.
        Clipped to the keyhole window above; only this group moves on click.
        clip-path uses userSpaceOnUse (default) so the window stays fixed
        in SVG coordinates while this group translates down through it.
      -->
      <g id="splash-monster" clip-path="url(#keyhole-clip)" style="will-change:transform;">

        <!-- Eye white — single-eye default state -->
        <circle id="eye-white" cx="157.5" cy="151.5" r="80.5" fill="white"/>

        <!-- Eye whites — two-eye flash state (shown for one frame on click) -->
        <circle id="eye-white-left"  cx="87"  cy="128" r="60" fill="white" style="display:none"/>
        <circle id="eye-white-right" cx="226" cy="128" r="60" fill="white" style="display:none"/>

        <!--
          Iris/pupil. JS drives this group's translate for mouse tracking.
          Resting center: (165, 114.5) in SVG coords.
        -->
        <g id="iris">
          <path d="M165 151C185.435 151 202 134.658 202 114.5C202 94.3416 185.435 78 165 78C144.565 78 128 94.3416 128 114.5C128 134.658 144.565 151 165 151Z" fill="#32261F"/>
        </g>

        <!-- Irises — two-eye flash state -->
        <circle id="iris-left"  cx="87"  cy="113" r="36" fill="#32261F" style="display:none"/>
        <circle id="iris-right" cx="226" cy="113" r="36" fill="#32261F" style="display:none"/>

        <!--
          Blue creature body — large rect that fills well beyond the clip window.
          fill-rule="evenodd" lets the eye-socket sub-path punch a hole
          through the blue so the eye whites underneath show through.
          JS swaps to TWO_EYE_BODY for the one-frame flash on click.
        -->
        <path id="keyhole-path" fill="#378CDA" fill-rule="evenodd"
          d="M-100 -600L413 -600L413 1200L-100 1200Z M89.9509 141.796C134.33 105.57 178.67 105.57 223.049 141.796C178.67 159.449 134.33 159.449 89.9509 141.796Z"/>

      </g>
    </svg>
  </div>

  <script src="assets/scripts.js"></script>
  <script>
    // ─── Elements ────────────────────────────────────────────────
    const svg            = document.getElementById('keyhole-svg');
    const splashMonster  = document.getElementById('splash-monster');
    const iris           = document.getElementById('iris');
    const eyeWhite       = document.getElementById('eye-white');
    const keyholePath    = document.getElementById('keyhole-path');
    const eyeWhiteLeft   = document.getElementById('eye-white-left');
    const eyeWhiteRight  = document.getElementById('eye-white-right');
    const irisLeft       = document.getElementById('iris-left');
    const irisRight      = document.getElementById('iris-right');

    // Creature body paths — large rect clipped to the keyhole window.
    // evenodd fill-rule punches eye-socket holes so eye whites show through.
    const ONE_EYE_BODY = 'M-100 -600L413 -600L413 1200L-100 1200Z M89.9509 141.796C134.33 105.57 178.67 105.57 223.049 141.796C178.67 159.449 134.33 159.449 89.9509 141.796Z';
    const TWO_EYE_BODY = 'M-100 -600L413 -600L413 1200L-100 1200Z M30 141.796C68 105.57 107 105.57 145 141.796C107 159.449 68 159.449 30 141.796Z M168 141.796C206 105.57 245 105.57 283 141.796C245 159.449 206 159.449 168 141.796Z';


    // ─── Mouse tracking ──────────────────────────────────────────
    const IRIS_X = 165;   // iris resting center, SVG coords
    const IRIS_Y = 114.5;
    const MAX_X  = 15;    // max travel, SVG units (elliptical envelope)
    const MAX_Y  = 10;

    let cx = 0, cy = 0;   // current offset
    let tx = 0, ty = 0;   // target offset
    let tracking = true;

    function lerp(a, b, t) { return a + (b - a) * t; }

    function tick() {
      cx = lerp(cx, tx, 0.08);
      cy = lerp(cy, ty, 0.08);
      iris.setAttribute('transform', `translate(${cx.toFixed(3)}, ${cy.toFixed(3)})`);
      requestAnimationFrame(tick);
    }
    requestAnimationFrame(tick);

    document.addEventListener('mousemove', e => {
      if (!tracking) return;

      const r     = svg.getBoundingClientRect();
      const scale = r.width / 313;

      const eyeVX = r.left + IRIS_X * scale;
      const eyeVY = r.top  + IRIS_Y * scale;

      const dx   = (e.clientX - eyeVX) / scale;
      const dy   = (e.clientY - eyeVY) / scale;
      const dist = Math.sqrt(dx * dx + dy * dy);

      if (dist < 1) { tx = 0; ty = 0; return; }

      const nx = dx / dist;
      const ny = dy / dist;

      // Elliptical max: more horizontal room than vertical
      const maxR    = 1 / Math.sqrt((nx / MAX_X) ** 2 + (ny / MAX_Y) ** 2);
      // Ease in — iris is sluggish right on top, reaches full travel at ~60 units away
      const strength = Math.min(dist / 60, 1);

      tx = nx * maxR * strength;
      ty = ny * maxR * strength;
    });


    // ─── Click animation ─────────────────────────────────────────
    //
    // Timing:
    //   0 –  100ms  Pause    — nothing moves
    // 100 –  500ms  Drop     — creature slides off bottom, ease-in (gravity)
    //               Flash    — two-eye state shows for one frame as it drops
    // 500 –  800ms  Fade     — screen fades to black (300ms)
    // 800ms         Navigate — home.html crossfades in (500ms on that side)

    const overlay  = document.getElementById('fade-overlay');
    let animating  = false;

    document.addEventListener('click', () => {
      if (animating) return;
      animating = true;
      tracking  = false;
      tx = 0; ty = 0; // snap iris, stop tracking

      // ── 100ms pause — nothing moves ───────────────────────────
      setTimeout(() => {

        // Flash two-eye body for exactly one painted frame
        keyholePath.setAttribute('d', TWO_EYE_BODY);
        eyeWhite.style.display      = 'none';
        iris.style.display          = 'none';
        eyeWhiteLeft.style.display  = '';
        eyeWhiteRight.style.display = '';
        irisLeft.style.display      = '';
        irisRight.style.display     = '';

        requestAnimationFrame(() => {

          // ── Drop: Splash_Monster falls, keyhole clip stays fixed ─
          splashMonster.style.transition = 'transform 400ms cubic-bezier(0.4, 0, 1, 1)';
          splashMonster.style.transform  = 'translateY(2000px)';

          // ── Fade to black: begins when drop lands ──────────────
          setTimeout(() => {
            overlay.style.transition = 'opacity 300ms ease';
            overlay.style.opacity    = '1';

            // ── Navigate: home.html fades in from black ────────────
            setTimeout(() => {
              sessionStorage.setItem('from-splash', '1');
              window.location.href = 'home.html';
            }, 300);

          }, 400); // drop duration

        }); // rAF — lets two-eye state paint before drop starts

      }, 100); // initial pause
    });
  </script>

</body>
</html>
