  <style>
  html, body {
    overflow-x: hidden;
    overflow-y: auto;
    scrollbar-width: none;
    background: var(--color-blue);
  }
  body::-webkit-scrollbar { display: none; }

  #monster-group {
    display: none;
    position: absolute;
    bottom: var(--footer-height);
    left: 0;
    width: 100%;
    z-index: 5;
    transform: translateY(250px);
    will-change: transform;
  }
  #monster-group.popped-up {
    transform: translateY(0);
    transition: transform 1800ms cubic-bezier(0.16, 1, 0.3, 1);
    transition-delay: 1.1s;
  }
  /* wave-risen declared after popped-up so it wins when both classes are active */
  #monster-group.wave-risen {
    transform: translateY(-55vh);
    z-index: 16;
    transition: transform 600ms ease-out;
    transition-delay: 0s;
  }

  .monster-area {
    position: relative;
    width: 100%;
    height: var(--wave-height-desktop);
  }
  .monster-area img.wave {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    display: block;
    pointer-events: none;
  }
  .monster-eyes-overlay {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    overflow: visible;
  }

  /* ── Wordmark logo override ────────────────────────── */
  /* Default .logo is sized for the keyhole; wordmark is wider and shorter */
  .logo { width: 204px; height: 80px; }
  .logo .wordmark-keyhole { transition: fill 0.2s ease; }
  .logo:hover .wordmark-keyhole { fill: var(--color-blue); }

  /* ── Page canvas ───────────────────────────────────── */
  .page {
    max-width: 1440px;
    margin: 0 auto;
    height: calc(100vh + var(--footer-height));
  }

  /* ── Circular sticker ─────────────────────────────────── */
  /* Figma: left:1186 top:114 on 1440×1024 canvas → 82.4% / 11.1% */
  .sticker-outer {
    left: 82.4%;
    top: 11.1%;
    width: 176px;
    height: 176px;
  }
  @keyframes coinflip {
    from { transform: rotateY(0deg); }
    to   { transform: rotateY(360deg); }
  }
  .sticker-hand-spin {
    animation: coinflip 5s linear infinite;
    transform-box: fill-box;
    transform-origin: 50% 50%;
  }

  /* ── Furniture objects ─────────────────────────────── */
  .obj-couch      { left: 27.6%; top:  9.375vh; width: 29.9%; aspect-ratio: 430/410; }
  .obj-carpet     { left: 24.2%; top: 50.1vh;  width: 31.2%; aspect-ratio: 449/275; }
  .obj-dresser    { left: 54.2%; top: 47.36vh; width: 39.4%; aspect-ratio: 568/303; }
  .obj-nightstand { left: 11.3%; top: 32.32vh; width: 21.8%; aspect-ratio: 314/286; }
  .obj-vase       { left: 60.5%; top: 10.74vh; width: 13.5%; aspect-ratio: 194/353; }

  .obj img { width: 100%; height: auto; display: block; pointer-events: none; }

  /* ── Furniture eye overlay sizing ─────────────────── */
  /* img.base and .eyes must fill their immediate container */
  .obj.furniture img.base { width: 100%; height: 100%; object-fit: contain; }
  .obj.furniture .eyes    { width: 100%; height: 100%; }

  /* ── Splash crossfade overlay ──────────────────────── */
  #splash-fade {
    position: fixed;
    inset: 0;
    background: #000;
    opacity: 1;
    z-index: 9999;
    pointer-events: none;
    transition: opacity 500ms ease;
  }
  </style>
</head>
<body>

  <!-- Splash crossfade: starts opaque; fades out if 'from-splash' flag is set -->
  <div id="splash-fade"></div>
  <script>
    (function () {
      var overlay = document.getElementById('splash-fade');
      if (sessionStorage.getItem('from-splash')) {
        sessionStorage.removeItem('from-splash');
        // rAF ensures the opaque frame paints before the transition starts
        requestAnimationFrame(function () {
          overlay.style.opacity = '0';
          overlay.addEventListener('transitionend', function () {
            overlay.remove();
          }, { once: true });
        });
      } else {
        overlay.style.display = 'none';
      }
    })();
  </script>

  <script src="assets/scripts.js"></script>
  <script>
    const page         = document.querySelector('.page');
    const monsterGroup = document.getElementById('monster-group');
    const monsterArea  = document.getElementById('monster-area');
    const monIrisR     = document.getElementById('mon-iris-r');
    const monIrisL     = document.getElementById('mon-iris-l');

    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        monsterGroup.classList.add('popped-up');
      });
    });

    function getWaveTop() {
      const pageRect = page.getBoundingClientRect();
      const waveRect = monsterArea.getBoundingClientRect();
      return waveRect.top - pageRect.top;
    }

    function trackIris(el, localX, localY, restX, restY, maxX, maxY) {
      const dx = localX - restX;
      const dy = localY - restY;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < 1) {
        el.setAttribute('cx', restX);
        el.setAttribute('cy', restY);
        return;
      }
      const nx = dx / dist;
      const ny = dy / dist;
      const strength = Math.min(dist / 200, 1);
      el.setAttribute('cx', restX + nx * maxX * strength);
      el.setAttribute('cy', restY + ny * maxY * strength);
    }

    document.addEventListener('mousemove', e => {
      const waveTop = getWaveTop();
      const pageRect = page.getBoundingClientRect();
      const x = ((e.clientX - pageRect.left) / monsterArea.getBoundingClientRect().width) * 1440;
      const y = e.clientY - pageRect.top;
      trackIris(monIrisR, x, y - waveTop, 652.9, 49.45, 20, 5);
      trackIris(monIrisL, x, y - waveTop, 495.41, 49.46, 20, 5);
    });

    // ── Wordmark keyhole iris tracking ─────────────────────────
    // Cursor position mapped to ±4 SVG units (x) / ±2 SVG units (y)
    // relative to the iris rest position (cx:27.325, cy:19.055).
    // Eye centre in viewport space is derived live from the SVG's
    // bounding rect so it works regardless of page scale or scroll.
    (function () {
      var wmIris = null;
      var restX = 27.325, restY = 19.055;
      var maxX  = 4.0,    maxY  = 2.0;

      document.addEventListener('mousemove', function (e) {
        if (!wmIris) wmIris = document.getElementById('wordmark-iris');
        if (!wmIris) return;

        var rect  = wmIris.ownerSVGElement.getBoundingClientRect();
        // Eye centre as a fixed fraction of the rendered wordmark SVG
        var eyeX  = rect.left + rect.width  * 0.509;
        var eyeY  = rect.top  + rect.height * 0.191;

        var dx    = e.clientX - eyeX;
        var dy    = e.clientY - eyeY;
        var dist  = Math.sqrt(dx * dx + dy * dy);
        if (dist < 1) {
          wmIris.setAttribute('cx', restX);
          wmIris.setAttribute('cy', restY);
          return;
        }

        var strength = Math.min(dist / 400, 1);
        wmIris.setAttribute('cx', restX + (dx / dist) * maxX * strength);
        wmIris.setAttribute('cy', restY + (dy / dist) * maxY * strength);
      });
    }());

    // ── Furniture drag ─────────────────────────────────────────
    var dragging = null;
    var dragOffX = 0, dragOffY = 0;
    var topZ = 10;

    document.querySelectorAll('.obj.furniture').forEach(function (el) {
      el.addEventListener('mousedown', function (e) {
        dragging = el;
        var rect = el.getBoundingClientRect();
        var pr   = page.getBoundingClientRect();
        dragOffX = e.clientX - rect.left;
        dragOffY = e.clientY - rect.top;
        el.classList.add('is-dragging');
        el.style.zIndex = ++topZ;
        e.preventDefault();
      });
    });

    document.addEventListener('mousemove', function (e) {
      if (!dragging) return;
      var pr = page.getBoundingClientRect();
      dragging.style.left = (e.clientX - pr.left - dragOffX) + 'px';
      dragging.style.top  = (e.clientY - pr.top  - dragOffY) + 'px';
    });

    // ── Easter egg: all furniture off-screen → monster rises ───
    // Off-screen = ≤20% of the element's area is within the viewport.
    function visibleFraction(el) {
      var r    = el.getBoundingClientRect();
      var area = r.width * r.height;
      if (area === 0) return 0;
      var ix = Math.max(0, Math.min(r.right,  window.innerWidth)  - Math.max(r.left, 0));
      var iy = Math.max(0, Math.min(r.bottom, window.innerHeight) - Math.max(r.top,  0));
      return (ix * iy) / area;
    }

    function checkFurniture() {
      var pieces = document.querySelectorAll('.obj.furniture');
      var allOff = Array.prototype.every.call(pieces, function (el) {
        return visibleFraction(el) <= 0.20;
      });
      if (allOff) {
        monsterGroup.style.display = 'block';
        monsterGroup.classList.add('wave-risen');
      } else {
        monsterGroup.classList.remove('wave-risen');
        monsterGroup.style.display = 'none';
      }
    }

    document.addEventListener('mouseup', function () {
      if (dragging) {
        dragging.classList.remove('is-dragging');
        dragging = null;
      }
      checkFurniture();
    });

    // Prevent browser's native drag ghost on images
    document.querySelectorAll('.obj.furniture img').forEach(function (img) {
      img.addEventListener('dragstart', function (e) { e.preventDefault(); });
    });

    // ── Furniture eye animation ────────────────────────────────
    // Staggered starts so the five pieces don't blink in sync.
    setTimeout(function () {
      KT.animateObjectEyes({
        irisL:  document.getElementById('nightstand-iris-l'),
        irisR:  document.getElementById('nightstand-iris-r'),
        eyeL:   document.getElementById('nightstand-eye-l'),
        eyeR:   document.getElementById('nightstand-eye-r'),
        restL:  { x: 236.9,  y: 95.6  },
        restR:  { x: 159.4,  y: 107.0 },
        rangeL: 3,
        rangeR: 3
      });
    }, Math.random() * 3000);

    setTimeout(function () {
      KT.animateObjectEyes({
        irisL:  document.getElementById('dresser-iris-l'),
        irisR:  document.getElementById('dresser-iris-r'),
        eyeL:   document.getElementById('dresser-eye-l'),
        eyeR:   document.getElementById('dresser-eye-r'),
        restL:  { x: 273.2, y: 86.75 },
        restR:  { x: 167.9, y: 72.0  },
        rangeL: 3,
        rangeR: 3
      });
    }, Math.random() * 3000);

    setTimeout(function () {

        irisR:  document.getElementById('couch-iris-r'),
        eyeL:   document.getElementById('couch-eye-l'),

        restL:  { x: 212.6,  y: 77.8  },
        restR:  { x: 139.25, y: 86.85 },
        rangeL: 3,
        rangeR: 3
      });
    }, Math.random() * 3000);

    setTimeout(function () {
      KT.animateObjectEyes({
        irisL:  document.getElementById('carpet-iris-l'),
        irisR:  document.getElementById('carpet-iris-r'),
        eyeL:   document.getElementById('carpet-eye-l'),
        eyeR:   document.getElementById('carpet-eye-r'),
        restL:  { x: 283, y: 118 },
        restR:  { x: 202, y: 140 },
        rangeL: 3,
        rangeR: 3
      });
    }, Math.random() * 3000);

    setTimeout(function () {
      KT.animateObjectEyes({
        irisL:  document.getElementById('vase-iris-l'),
        irisR:  document.getElementById('vase-iris-r'),
        eyeL:   document.getElementById('vase-eye-l'),
        eyeR:   document.getElementById('vase-eye-r'),
        restL:  { x: 139.85, y: 123.9  },
        restR:  { x: 91.05,  y: 107.23 },
        rangeL: 3,
        rangeR: 3
      });
    }, Math.random() * 3000);
  </script>
